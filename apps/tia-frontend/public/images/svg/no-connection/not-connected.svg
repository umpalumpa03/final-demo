<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

    <style>
        @keyframes drawSlash {
            from {
                stroke-dashoffset: 62;
            }
            to {
                stroke-dashoffset: 0;
            }
        }
    
        @keyframes drawCircle {
            from {
                stroke-dashoffset: 188;
            }
            to {
                stroke-dashoffset: 0;
            }
        }
    
        .dialog__icon-circle {
            stroke-dasharray: 188;
            stroke-dashoffset: 188;
            animation: drawCircle 0.8s ease-out 0.2s forwards;
        }
    
        .dialog__icon-slash {
            stroke-dasharray: 62;
            stroke-dashoffset: 62;
            animation: drawSlash 0.4s ease-out 1s forwards;
        }

        .dialog__icon-wifi {
            opacity: 0.7;
        }
    </style>
    
    <circle class="dialog__icon-circle" cx="32" cy="32" r="30" stroke="currentColor" stroke-width="4" />
    <path class="dialog__icon-slash" d="M10 10L54 54" stroke="currentColor" stroke-width="4"
        stroke-linecap="round" />
    <path class="dialog__icon-wifi"
        d="M16 28C21.5228 22.4772 29.7239 20 32 20C34.2761 20 42.4772 22.4772 48 28M20 36C23.6863 32.3137 28.3137 30 32 30C35.6863 30 40.3137 32.3137 44 36M28 44C29.1046 42.8954 30.5523 42 32 42C33.4477 42 34.8954 42.8954 36 44"
        stroke="currentColor" stroke-width="3" stroke-linecap="round" />
</svg>