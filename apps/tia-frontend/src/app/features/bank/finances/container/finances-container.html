<div class="global-bank-wrapper">
  <app-finances-view
    [financeTitle]="financeTitle"
    [financeSubTitle]="financeSubTitle"
    [activeFilter]="activeFilter()"
    [filterOptions]="filterOptions"
    [filterForm]="filterForm"
    [monthOptions]="monthOptions()"
    [loading]="store.loading()"
    [error]="store.error()"
    [summaryCards]="store.summaryCards()"
    [charts]="store.charts()"
    [categories]="store.categoriesWithIcons()"
    [transactions]="store.transactionsWithIcons()"
    (filterChange)="onFilterChange($event)"
  ></app-finances-view>
</div>
