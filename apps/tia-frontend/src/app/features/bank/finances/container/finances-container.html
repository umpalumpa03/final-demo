<app-finances-view

  [financeSubTitle]="financeSubTitle"
  [activeFilter]="activeFilter"
  [filterOptions]="filterOptions"
  [filterForm]="filterForm"
  [loading]="store.loading()"
  [error]="store.error()"
  [summaryCards]="summaryCardsData()"
  (filterChange)="onFilterChange($event)"
  (dateInput)="handleInput($event.field, $event.event)"
  [categoryChartData]="store.categoryChartData()"
  [mainChartData]="store.mainChartData()"
  [savingsChartData]="store.savingsChartData()"
  [dailyChartData]="store.dailyChartData()"
></app-finances-view>
