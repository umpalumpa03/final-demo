<main class="external-recipient">
  <header class="external-recipient__header">
    <h1 class="external-recipient__title">
      {{'transfers.external.recipient.title' | translate}}
    </h1>
  </header>

  <div class="external-recipient__form-group">
    <div class="external-recipient__input-col">
      <lib-text-input
        [formControl]="recipientInput"
        [config]="recipientInputConfig()"
        [state]="recipientInput.valid && recipientInput.value ? 'success' : 'default'"
      ></lib-text-input>
    </div>

    <div class="external-recipient__button-col">
      <app-button
        (click)="onVerify()"
        [isDisabled]="!recipientInput.valid || !recipientInput.value"
        [isLoading]="isLoading()"
      >
        {{'transfers.external.recipient.verify' | translate}}
        <img src="images/svg/transfers/arrow-right.svg" alt="arrow" />
      </app-button>
    </div>
  </div>
</main>

@if (showError()) {
<div class="external-recipient__error-toast">
  <app-alert-types-with-icons
    [alertType]="'error'"
    [alertMessage]="'transfers.external.recipient.recipientNotFound' | translate"
  />
</div>
}
