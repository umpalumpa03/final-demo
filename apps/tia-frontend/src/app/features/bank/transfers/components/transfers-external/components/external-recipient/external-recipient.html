<main class="external-recipient">
  <header class="external-recipient__header">
    <h1 class="external-recipient__title">
      {{'transfers.external.recipient.title' | translate}}
    </h1>
  </header>

  <div class="external-recipient__input-wrapper">
    <lib-text-input
      [formControl]="recipientInput"
      [config]="recipientInputConfig()"
      [state]="recipientInput.valid && recipientInput.value ? 'success' : 'default'"
    ></lib-text-input>
  </div>

  <section class="external-recipient__accounts">
    <h2 class="external-recipient__accounts-title">
      {{'transfers.external.recipient.accountsTitle' | translate}}
    </h2>
    <div class="external-recipient__accounts-grid">
      @for (account of accounts(); track account.id) {
      <app-transfers-account-card
        [cardData]="account"
        [isSelected]="selectedAccountId === account.id"
        (cardClicked)="onAccountSelect($event)"
      />
      }
    </div>
  </section>

  <div class="external-recipient__actions">
    <div
      class="external-recipient__button-wrapper"
      [attr.data-tooltip]="(!recipientInput.valid || !recipientInput.value || !selectedAccountId) 
        ? ('transfers.external.recipient.disabledTooltip' | translate) 
        : null"
    >
      <app-button
        [isDisabled]="!recipientInput.valid || !recipientInput.value || !selectedAccountId"
      >
        {{'transfers.external.recipient.verify' | translate}}
        <img src="images/svg/transfers/arrow-right.svg" alt="arrow" />
      </app-button>
    </div>
  </div>
</main>
