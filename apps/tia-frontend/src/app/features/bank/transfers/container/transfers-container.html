<div class="global-bank-wrapper">
  @if (isLoadingMeta()) {
  <div class="transfers__loader">
    <app-route-loader variant="pulsing"></app-route-loader>
  </div>
  } @else {
  <div class="transfers_wrapper">
    <app-library-title
      [title]="'transfers.title'| translate"
      [subtitle]="'transfers.description' | translate"
    ></app-library-title>
    <app-tabs [tabs]="transferTabs()" [orientation]="'horizontal'"></app-tabs>
  </div>

  <router-outlet></router-outlet>
  }
</div>
