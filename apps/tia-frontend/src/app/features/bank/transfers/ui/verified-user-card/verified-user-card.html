<article class="verified-user-card">
  <div class="verified-user-card__avatar">
    <span class="verified-user-card__initials">{{ initials() }}</span>
  </div>

  <div class="verified-user-card__content">
    <h3 class="verified-user-card__name">{{ fullName() }}</h3>
    <p class="verified-user-card__description">{{ description() }}</p>
  </div>
</article>
