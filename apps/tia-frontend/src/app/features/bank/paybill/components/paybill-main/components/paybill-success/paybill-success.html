<app-basic-card maxWidth="100%" minHeight="70rem" padding="2.4rem">
  <div class="success-layout">
    <header class="success-header">
      <div class="success-icon-container">
        <span class="tia-icon tia-icon-check"></span>
      </div>
      <h1 class="success-title">
        {{ 'paybill.main.success.title' | translate }}
      </h1>
      <p class="success-description">
        {{ 'paybill.main.success.description' | translate }}
      </p>
    </header>

    <div class="success-layout__card">
      <app-payment-summary
        [items]="items()"
        [headerTitle]="headerTitle()"
        [headerSubtitle]="'paybill.main.success.summary_subheader' | translate"
        [iconBgColor]="iconBgColor()"
        [iconBgPath]="iconBgPath()"
      />
    </div>

    <footer class="success-footer">
      <app-button
        variant="secondary"
        [fullWidth]="true"
        (click)="payAnother.emit()"
      >
        {{ 'paybill.main.success.pay_another_btn' | translate }}
      </app-button>

      <app-button [fullWidth]="true" (click)="goDashboard.emit()">
        {{ 'paybill.main.success.dashboard_btn' | translate }}
      </app-button>
    </footer>
  </div>
</app-basic-card>
