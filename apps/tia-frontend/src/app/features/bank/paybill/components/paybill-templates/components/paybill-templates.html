<app-tree-container
  [groups]="treeGroups"
  [items]="treeItems"
  [canDelete]="true"
  [editable]="true"
  [hasButton]="true"
  [buttonVariant]="'default'"
  [buttonContent]="'paybill.templates.payButton' | translate"
  [hasCheckbox]="true"
  [noCardBorder]="true"
  [errorHeader]="'paybill.templates.errorHeader' | translate"
  [errorMessage]="'paybill.templates.errorMessage' | translate"
  [contentHeader]="true"
  [cardBackground]="true"
>
  <div class="templates__header">
    <app-library-title
      [title]="'paybill.templates.title' | translate"
      [subtitle]="'paybill.templates.description' | translate"
    >
    </app-library-title>
    <div class="templates__header__cta">
      @for (button of headerButtons; track button.action) {
      <app-button
        [variant]="button.variant"
        (click)="handleHeaderButtonClick(button.action)"
        >{{ button.textKey | translate}}</app-button
      >
      }
    </div>
  </div>
</app-tree-container>

<app-ui-modal class="modal" [isOpen]="isModalOpen()" (closed)="toggleModal()">
  @if (currentModalConfig(); as config) {
  <app-library-title
    [title]="config.title"
    [subtitle]="config.subtitle"
    class="modal__header"
  />

  <main>
    @if (config.fields?.length) { @for (field of config.fields; track
    field.controlName) { @if(field.type === 'dropdown') {
    <!-- Options here should come from backend -->
    <lib-select
      [options]="[{label: 'hello', value: 'asd'}]"
      [config]="{ label: field.label, placeholder: field.placeholder }"
    ></lib-select>
    }@else {
    <lib-text-input
      [type]="field.type"
      [config]="{ label: field.label, placeholder: field.placeholder }"
    />
    } } }

    <div class="modal__buttons">
      <app-button variant="outline" (click)="toggleModal()">
        Cancel
      </app-button>
      <app-button [variant]="config.submitType">
        {{ config.submitLabel }}
      </app-button>
    </div>
  </main>
  }
</app-ui-modal>
