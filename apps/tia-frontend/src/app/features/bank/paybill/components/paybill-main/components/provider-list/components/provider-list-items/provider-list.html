<app-basic-card
  maxWidth="100%"
  padding="2.4rem 0 2.4rem 2.4rem"
  class="basic-card"
>
  <div class="category-header">
    <div class="category-header__icon-box">
      @if (isLoading()) {
      <div class="category-header__skeleton-icon">
        <app-skeleton
          variant="rectangle"
          width="100%"
          height="100%"
          borderRadius="1.6rem"
        />
      </div>
      } @else {
      <div
        class="category-header__icon-background"
        [style.background-color]="iconBgColor()"
      >
        <img [src]="iconBgPath()" class="category-header__img" alt="" />
      </div>
      }
    </div>

    <div class="category-header__text">
      @if (isLoading()) {
      <div class="category-header__skeleton-text">
        <app-skeleton variant="text" width="16rem" height="2.4rem" />
        <app-skeleton variant="text" width="12rem" height="1.6rem" />
      </div>
      } @else {
      <h2 class="category-header__title">{{ headerTitle() }}</h2>
      <p class="category-header__subtitle">{{ subtitle() }}</p>
      }
    </div>
  </div>

  <div class="provider-list">
    @if (isLoading()) {
    <div class="providers-container">
      @for (item of [1, 2, 3, 4, 5]; track item) {
      <app-provider-item [isLoading]="true" />
      }
    </div>
    } @else if (providers().length > 0) {
    <app-scroll-area [hideBorder]="true" scrollbar="hidden" height="40rem">
      <div class="providers-container">
        @for (item of providers(); track item.id) {
        <app-provider-item
          [name]="item.name || ''"
          [indicatorColor]="iconBgColor() || ''"
          [isFinal]="!!item.isFinal!"
          (selected)="selected.emit(item.id)"
        />
        }
      </div>
    </app-scroll-area>
    } @else {
    <div class="provider-list__empty-state">
      <app-error-states
        variant="not-found"
        [header]="'paybill.main.error.not-available' | translate"
        [message]="'paybill.main.error.not-available-subtitle' | translate"
        [showButton]="false"
        [border]="false"
        height="22rem"
      />
    </div>
    }
  </div>
</app-basic-card>
