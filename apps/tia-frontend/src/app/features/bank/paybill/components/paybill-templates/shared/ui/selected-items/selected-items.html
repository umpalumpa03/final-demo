<div class="selected__container">
  <div class="selected__container__description">
    <img src="images/svg/paybill/selected.svg" alt="selected icon" />
    @if (forModal()) {
    <span>{{ selectedItems().length }} bill(s) selected for payment</span>
    }@else {
    <span>{{ selectedItems().length }} template(s) selected</span>
    }
  </div>
  @if (!forModal()) {
  <app-button variant="default" (click)="onPaySelectedClick()">
    Pay Selected
  </app-button>
  }
</div>
