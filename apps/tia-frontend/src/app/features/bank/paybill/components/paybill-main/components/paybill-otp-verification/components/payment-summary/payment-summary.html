<div class="summary-container" [style.backgroundColor]="backgroundColor()">
  <header class="summary-header">
    <div class="summary-header__left">
      @if (iconUrl()) {
      <img [src]="iconUrl()" alt="icon" class="summary-header__icon" />
      }
      <div class="summary-header__text">
        <h3 class="summary-header__title" [style.color]="headerColor()">
          {{ headerTitle() }}
        </h3>
        @if (headerSubtitle()) {
        <p class="summary-header__subtitle">{{ headerSubtitle() }}</p>
        }
      </div>
    </div>
  </header>

  <div class="summary-list">
    @for (item of items(); track item.label) {
    <div class="summary-row" [class.summary-row--total]="item.isTotal">
      <span class="summary-row__label">{{ item.label }}</span>
      <span class="summary-row__value">{{ item.value }}</span>
    </div>
    }
  </div>
</div>
