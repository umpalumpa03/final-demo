<div class="verified-container">
  <div class="verified-status">
    <span class="verified-text">Account Verified</span>
  </div>

  <div class="details-grid">
    <div class="detail-row">
      <span class="label">Customer Name:</span>
      <span class="value">{{ details()?.accountHolder }}</span>
    </div>
    <div class="detail-row">
      <span class="label">Bill Period:</span>
      <span class="value">December 2025</span>
    </div>
    <div class="detail-row">
      <span class="label">Due Date:</span>
      <span class="value value--alert">{{ details()?.dueDate }}</span>
    </div>
  </div>
</div>
