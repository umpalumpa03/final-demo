@if (facade.activeProvider() && facade.paymentPayload() &&
facade.verifiedDetails()) {
<app-paybill-confirm-payment
  [provider]="facade.activeProvider()!"
  [summary]="facade.paymentPayload()!"
  [details]="facade.verifiedDetails()!"
  (confirm)="confirmPayment()"
  [iconBgColor]="facade.activeCategoryUI()!.iconBgColor"
  [iconBgPath]="facade.activeCategoryUI()!.iconBgPath"
  (cancelPayment)="onBackToDetails()"
  [currentAccounts]="facade.storeAccounts()"
  [selectedAccountId]="facade.selectedSenderAccountId()!"
  (selectedAccountIdChange)="facade.updateSenderAccount($event)"
  [isLoading]="facade.isLoading()"
/>
}@else {
<app-basic-card
  maxWidth="100%"
  padding="0rem 0 2.4rem 2.4rem"
  minHeight="65rem"
  justifyContent="center"
>
  <app-error-states
    variant="failed"
    [header]="'paybill.main.error.payment_missing_title' | translate"
    [message]="'paybill.main.error.missing_data_message' | translate"
    [buttonMessage]="'paybill.main.error.back_to_categories' | translate"
    [border]="false"
    (buttonClick)="onBackToDetails()"
    maxWidth="100%"
  />
</app-basic-card>
}
