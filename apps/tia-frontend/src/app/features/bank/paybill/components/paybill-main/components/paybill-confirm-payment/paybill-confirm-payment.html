<app-basic-card
  class="confirm-card"
  maxWidth="100%"
  minHeight="70rem"
  padding="2.4rem"
>
  <header class="confirm-card__header">
    <app-library-title [title]="title" [subtitle]="subtitle" />
  </header>

  <div class="confirm-content">
    <app-payment-summary
      [iconBgColor]="iconBgColor()"
      [iconBgPath]="iconBgPath()"
      [items]="summaryItems()"
      [headerTitle]="provider().name!"
      headerSubtitle="Enter your bill details"
      type="confirm-payment"
    ></app-payment-summary>

    <div class="confirm-content__options">
      <lib-select
        [options]="currentAccounts()!"
        [value]="selectedAccountId()"
        [config]="selectConfig"
      ></lib-select>
    </div>

    <footer class="confirm-actions">
      <app-button [fullWidth]="true" (click)="confirm.emit()">
        Confirm & Pay {{ summary().amount | currency: 'GEL':'symbol'}}
      </app-button>
      <app-button
        [fullWidth]="true"
        variant="secondary"
        (click)="cancelPayment.emit()"
        >Cancel</app-button
      >
    </footer>
  </div>
</app-basic-card>
