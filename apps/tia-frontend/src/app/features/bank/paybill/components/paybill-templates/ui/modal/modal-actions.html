<div class="modal__buttons">
  <app-button variant="outline" type="button" (click)="cancel.emit()">
    {{ 'paybill.templates.cancelButton' | translate}}
  </app-button>
  <app-button
    [variant]="submitVariant()"
    [type]="submitType()"
    (click)="submit.emit()"
    [isLoading]="isLoading()"
  >
    {{ submitLabel() | translate }}
  </app-button>
</div>
