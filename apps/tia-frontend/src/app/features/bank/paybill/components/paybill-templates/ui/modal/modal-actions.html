<div class="modal__buttons">
  <app-button
    [fullWidth]="true"
    variant="outline"
    type="button"
    (click)="cancelHandler()"
    [isDisabled]="isLoading()"
  >
    {{ 'paybill.templates.cancelButton' | translate}}
  </app-button>
  <app-button
    [variant]="submitVariant()"
    [type]="submitType()"
    [fullWidth]="true"
    (click)="submitHandler()"
    [isLoading]="isLoading()"
    [isDisabled]="isDisabled()"
  >
    {{ submitLabel() | translate }}
  </app-button>
</div>
