<div class="equal-distribution__container">
  <h3>Total Amount to Distribute</h3>
  <div class="equal-distribution__container__input">
    <label for="">$</label>
    <lib-text-input
      [config]="{placeholder: 'Amount to distribute',}"
      [formControl]="amountControl"
    />
  </div>
  @if (calculatedDistribution()) {
  <span>{{ calculatedDistribution() | currency }} per bill</span>
  }
</div>
