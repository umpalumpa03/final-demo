@if (facade.isFormView()) {
<router-outlet></router-outlet>
} @else {
  <app-provider-list
    [headerTitle]="providerListHeader()"
    [providers]="filteredProviders()"
    [iconBgColor]="facade.activeCategoryUI()?.iconBgColor"
    [iconBgPath]="facade.activeCategoryUI()?.iconBgPath"
    [subtitle]="facade.activeCategory()?.description || ''" 
    [isRoot]="facade.isRootProviderView()"
    [isLoading]="facade.isLoading() || !facade.activeCategory()"
    (selected)="onProviderSelected($event)"
  />
}
