@let activeUi = activeCategoryUI(); @let ui = activeCategory();

<div class="paybill-main">
  <div class="paybill-main__stage-wrapper">
    @if (activeProvider()) {
    <p>PLACEHOLDER PAYMENT FORM</p>
    } @else if (activeCategory(); as category) {

    <app-provider-list
      [categoryName]="ui!.name"
      [providers]="ui!.providers"
      [iconBgColor]="activeUi?.iconBgColor"
      [iconBgPath]="activeUi?.iconBgPath"
      [subtitle]="ui!.description"
      (selected)="selectProvider($event)"
    />

    } @else {
    <app-category-grid
      (selected)="selectCategory($event)"
      [categories]="formattedCategories()"
    />
    }
  </div>
</div>
