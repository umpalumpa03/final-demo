<div class="payment__distribution">
  <h3>Payment Distribution</h3>
  <div class="payment__distribution__buttons">
    <app-button
      [fullWidth]="true"
      [variant]="distributionMode() === 'individual' ? 'default' : 'outline'"
      (click)="onDistributionChange('individual')"
    >
      Individual Amounts
    </app-button>
    <app-button
      [fullWidth]="true"
      [variant]="distributionMode() === 'equal' ? 'default' : 'outline'"
      (click)="onDistributionChange('equal')"
    >
      Equal Distribution
    </app-button>
  </div>
</div>

@if(distributionMode() === 'equal') {
<app-total-amount
  [selectedItemsLength]="selectedItemsLength()"
></app-total-amount>
}
