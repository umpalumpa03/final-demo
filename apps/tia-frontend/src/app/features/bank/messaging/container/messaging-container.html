<div class="global-bank-wrapper messaging-container">
  <div class="messaging-container__navbar">
    <app-button
      variant="default"
      [icon]="'plus-icon.svg'"
      [fullWidth]="true"
      (click)="isComposeOpen.set(true)"
      >{{ isMobile() ? '' : 'messaging.compose.compose' | translate }}</app-button
    >
    <app-compose
      [isOpen]="isComposeOpen()"
      (close)="isComposeOpen.set(false)"
    ></app-compose>
    <app-navigation-bar
      [items]="messageRoutes()"
      [orientation]="'vertical'"
      [collapsed]="isMobile()"
    ></app-navigation-bar>
  </div>
  <div class="messaging-container__content">
    <router-outlet></router-outlet>
  </div>
</div>
