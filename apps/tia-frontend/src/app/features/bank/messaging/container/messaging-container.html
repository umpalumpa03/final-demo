<div class="global-bank-wrapper messaging-container">
  <div class="messaging-container__navbar">
    <app-button
      variant="default"
      [icon]="'plus-icon.svg'"
      [fullWidth]="true"
      (click)="isComposeOpen.set(true)"
      >{{ 'messaging.compose.compose' | translate }}</app-button
    >
    <app-compose
      [isOpen]="isComposeOpen()"
      (close)="isComposeOpen.set(false)"
    ></app-compose>
    <app-navigation-bar
      [items]="messageRoutes()"
      [orientation]="'vertical'"
    ></app-navigation-bar>
  </div>
  <div class="messaging-container__content">
    <router-outlet></router-outlet>
  </div>
  @if(error()) {
  <div
    class="fade-alert-container"
    [class.fade-alert--visible]="error()"
  >
    <app-dismissible-alerts
      [alertType]="'error'"
      [alertTitle]="'Oops!'"
      [alertMessage]="error() || 'An unexpected error occurred.'"
    ></app-dismissible-alerts>
  </div>
  } @else if (successMessage?.()) {
  <div
    class="fade-alert-container"
    [class.fade-alert--visible]="successMessage?.()"
  >
    <app-dismissible-alerts
      [alertType]="'success'"
      [alertTitle]="'Success!'"
      [alertMessage]="successMessage?.() ?? ''"
    ></app-dismissible-alerts>
  </div>
  }
</div>
