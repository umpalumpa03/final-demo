<header class="header">
  <div class="header__info">
    <h2 class="header__info__title">{{ page() }}</h2>
    <p class="header__info__count">{{ messageCount() }}</p>
    <p class="header__info__count">
      {{ 'messaging.compose.title' | translate }}
    </p>
  </div>
  @if(!isSent() && !(messageCount() == 0)){
  <div class="header__action">
    <div class="header__action">
      @if(showBulkActions()){
      <app-button
        variant="destructive"
        icon="trash-icon.svg"
        (click)="onDeleteClick()"
      ></app-button>
      @if(!isDraft()){
      <app-button
        variant="default"
        icon="mail-read.svg"
        (click)="bulkRead.emit()"
      ></app-button>
      } }
    </div>
    <div class="header__checkbox">
      <lib-checkboxes
        [checked]="isAllSelected() ?? false"
        (checkedChange)="toggleSelectAll.emit($event)"
      ></lib-checkboxes>
      <p>Select All</p>
    </div>
  </div>
  }
</header>

<app-ui-modal [isOpen]="isDeleteModalOpen()" (closed)="onCancelDelete()">
  <div class="delete-account">
    <header class="delete-account__header">
      <app-library-title
        title="Delete Email"
        subtitle="Are you sure you want to delete this email? This action cannot be undone."
      ></app-library-title>
    </header>
    <footer class="delete-account__footer">
      <app-button variant="outline" (click)="onCancelDelete()"
        >Cancel</app-button
      >
      <app-button variant="destructive" (click)="onConfirmDelete()"
        >Delete</app-button
      >
    </footer>
  </div>
</app-ui-modal>
