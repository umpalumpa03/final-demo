@if(mail()){
<div
  class="mail-card"
  [class.mail-card--read]="mail()?.isRead && !isSent() && !isDraft()"
  [class.mail-card--unread]="!mail()?.isRead"
  (click)="onCardClick()"
>
  @if(!isSent()){
  <lib-checkboxes
    [checked]="checked()"
    (checkedChange)="onCheckboxChange($event)"
    (click)="$event.stopPropagation()"
  >
  </lib-checkboxes>
  }
  <app-avatar
    size="md"
    [initials]="getInitials(mail()?.senderEmail ?? '')"
  ></app-avatar>
  <div class="mail-card__content">
    <div class="mail-card__header">
      <span class="mail-card__sender">{{ !isSent() ? mail()?.senderEmail : mail()?.receiverEmail }}</span>
      <span class="mail-card__date"
        >{{ mail()?.createdAt | date:'MMM d' }}</span
      >
    </div>
    <div class="mail-card__header">
      <div class="mail-card__subject">{{ mail()?.subject }}</div>
      <div class="mail-card__icons">
        @if(mail()?.isFavorite){
        <div
          class="mail-card__action-btn mail-card__action-btn--favorite"
        >
          <img src="/images/svg/messaging/mail-favorite.svg" alt="Favorite" />
        </div>
        } @if(mail()?.isImportant){
        <div
          class="mail-card__action-btn--important"
        >
          <img src="/images/svg/messaging/mail-important.svg" alt="Important" />
        </div>
        }
      </div>
    </div>

    <div class="mail-card__preview">{{ mail()?.body }}</div>
  </div>

  <div class="mail-card__actions">
    @if(!isSent()){ @if(!isDraft()){
    <button
      class="mail-card__action-btn--read"
      (click)="onMarkAsRead($event)"
      title="Mark as read"
    >
      <img
        src="/images/svg/messaging/{{mail()?.isRead ? 'read' : 'unread'}}.svg"
        [alt]="mail()?.isRead ? 'Read' : 'Unread'"
      />
    </button>
    }
    <button
      class="mail-card__action-btn mail-card__action-btn--delete"
      (click)="onDelete($event)"
      title="Delete"
    >
      <img src="/images/svg/messaging/delete.svg" alt="Delete" />
    </button>
    <app-ui-modal [isOpen]="isDeleteModalOpen()" (closed)="onCancelDelete()">
      <div class="delete-account">
        <header class="delete-account__header">
          <app-library-title
            title="Delete Email"
            subtitle="Are you sure you want to delete this email? This action cannot be undone."
          ></app-library-title>
        </header>
        <footer class="delete-account__footer">
          <app-button variant="outline" (click)="onCancelDelete()"
            >Cancel</app-button
          >
          <app-button variant="destructive" (click)="onConfirmDelete()"
            >Delete</app-button
          >
        </footer>
      </div>
    </app-ui-modal>
    }
  </div>
</div>
}
