<app-mail-header
  [page]="'messaging.routes.inbox' | translate"
  [messageCount]="total()"
  [isAllSelected]="isAllSelected()"
  (toggleSelectAll)="toggleSelectAll($event)"
  [showBulkActions]="hasBulkSelection()"
  (bulkDelete)="deleteSelectedMails()"
  (bulkRead)="markSelectedAsRead()"
></app-mail-header>
@if(isLoading() && (!mails().length || !loadsMoreMails())){
<div class="loading-state">
  <app-route-loader variant="pulsing" />
</div>
} @else if(!mails().length) {
<app-empty-card></app-empty-card>
} @else {
<div class="inbox-container">
  <app-scroll-area
    [height]="'80vh'"
    [hideBorder]="true"
    (scrollBottom)="onScrollBottom()"
  >
    @for (mail of mails(); track mail.id) {
    <app-mail-card
      [mail]="mail"
      [checked]="selectedMailIds().has(mail.id)"
      (checkedChange)="onMailChecked(mail.id, $event)"
      (markAsRead)="markAsRead(mail.id)"
      (deleteMail)="deleteMail(mail.id)"
      (cardClick)="goToDetail($event)"
      [currentUserEmail]="currentUserEmail()"
    ></app-mail-card>
    } @if (isLoading()) {
    <div class="loading-more-indicator">
      <app-route-loader variant="pulsing" [fillContainer]="true" />
    </div>
    }
  </app-scroll-area>
</div>
}
