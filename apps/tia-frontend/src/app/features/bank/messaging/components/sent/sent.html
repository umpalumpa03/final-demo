<app-mail-header
  [page]="'messaging.routes.sent' | translate"
  [messageCount]="mails().length"
  [isSent]="true"
></app-mail-header>
@if(isLoading()){
<div class="loading-state">
  <app-route-loader variant="full-page" text="Loading messages..." />
</div>
} @else if(!mails().length) {
<app-empty-card></app-empty-card>
} @else {
<div>
  @for (mail of mails(); track mail.id) {
  <app-mail-card [mail]="mail" [isSent]="true"> </app-mail-card>
  }
</div>
}
