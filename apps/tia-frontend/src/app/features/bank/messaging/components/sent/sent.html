<app-mail-header
  [page]="'messaging.routes.sent' | translate"
  [messageCount]="mails().length"
  [isSent]="true"
></app-mail-header>
@if(isLoading()){
<div class="loading-state">
  <app-route-loader variant="pulsing"/>
</div>
} @else if(!mails().length) {
<app-empty-card></app-empty-card>
} @else {
<div>
  @for (mail of mails(); track mail.id) {
  <app-mail-card 
  [mail]="mail" 
  [isSent]="true" 
  (cardClick)="goToDetail($event)"> </app-mail-card>
  }
</div>
}
