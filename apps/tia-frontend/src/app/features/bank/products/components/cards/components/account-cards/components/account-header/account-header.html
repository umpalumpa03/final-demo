<div class="account-header">
  <img
    [src]="'/images/svg/button-icons/account-icon.svg'"
    alt="Account"
    class="account-header__icon"
  />
  <div class="account-header__details">
    <h1 class="account-header__name">{{ account().name }}</h1>
    <p class="account-header__number">{{ account().iban }}</p>
  </div>
  <div class="account-header__badge">
    <app-badges [text]="cardsLabel()" variant="info" size="medium" shape="rounded" />
  </div>
</div>
