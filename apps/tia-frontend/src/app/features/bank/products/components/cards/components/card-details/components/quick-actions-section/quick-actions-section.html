<div class="card-details__actions-grid">


  <app-button
    variant="outline"
    [fullWidth]="true"
    icon="eye.svg"
    (click)="handleViewSensitiveDetails()"
  >
    {{'my-products.card.card-details.quick-actions-section.ViewSensitiveDetails'
    | translate }}
  </app-button>

  <app-button
    variant="outline"
    [fullWidth]="true"
    icon="transactions.svg"
    (click)="handleViewTransactions()"
  >
    {{'my-products.card.card-details.quick-actions-section.ViewTransactions' |
    translate }}
  </app-button>
</div>
