<app-basic-card>
  <ng-content select="[slot='header']">
    <div class="account-card__header">
      <div class="account-card__header-icon">
        <img
          [src]="getAccountIcon(account().type)"
          [alt]="account().type + ' account icon'"
        />
      </div>
      <div class="account-card__header-info">
        <h3 class="account-card__header-info-name">
          {{ account().friendlyName }}
        </h3>
        @if (account().status === 'active') {
        <span class="account-card__header-info-badge">active</span>
        }
        <p class="account-card__header-info-number">{{ account().iban }}</p>
      </div>
    </div>
  </ng-content>

  <ng-content select="[slot='balance']">
    <div class="account-card__balance">
      <p class="account-card__balance-label">Available Balance</p>
      <h2 class="account-card__balance-amount">
        {{ account().currency }} {{ formatCurrency(account().balance) }}
      </h2>
    </div>
  </ng-content>

  <ng-content select="[slot='details']">
    <div class="account-card__details">
      <div class="account-card__details-item">
        <span class="account-card__details-item-label">Type</span>
        <span class="account-card__details-item-value"
          >{{ account().type }}</span
        >
      </div>
      <div class="account-card__details-item">
        <span class="account-card__details-item-label">Created</span>
        <span class="account-card__details-item-value"
          >{{ formatDate(account().createdAt) }}</span
        >
      </div>
    </div>
  </ng-content>

  <ng-content select="[slot='actions']">
    <div class="account-card__actions">
      <app-button
        [variant]="'default'"
        [fullWidth]="true"
        (click)="handleTransfer()"
      >
        <span class="account-card__actions-icon">⇄</span>
        Make Transfer
      </app-button>
    </div>
  </ng-content>
</app-basic-card>
