<div class="accounts-page">
  <app-accounts-list
    [accountsGrouped]="accountsGrouped$ | async"
    [isLoading]="(isLoading$ | async) || false"
    [error]="error$ | async"
    [accountSections]="accountSectionsData"
    [isRenamingAccount]="(isRenamingAccount$ | async) || false"
    [renameError]="renameError$ | async"
    (openModal)="handleOpenModal()"
    (transfer)="handleTransfer($event)"
    (retry)="handleRetry()"
    (renameAccount)="handleRenameAccount($event)"
  />
</div>
