<div class="card-grid-skeleton">
  @for (id of cardIds(); track id) {
    <div class="card-grid-skeleton__item">
      <app-skeleton width="100%" height="20rem" />
      <div class="card-grid-skeleton__info">
        <app-skeleton width="60%" height="1.6rem" />
        <div class="card-grid-skeleton__meta">
          <app-skeleton width="8rem" height="2.4rem" />
          <app-skeleton width="4rem" height="1.4rem" />
        </div>
      </div>
    </div>
  }
</div>
