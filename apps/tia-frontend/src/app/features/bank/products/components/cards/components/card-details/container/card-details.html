
<div class="card-details">
  @if (loading$ | async) {
    <div class="card-details__loading">
      <app-route-loader variant="pulsing" />
    </div>
  } @else if (error$ | async; as errorMsg) {
    <app-error-states
      variant="failed"
      header="Failed to Load Card"
      [message]="errorMsg"
      buttonMessage="Retry"
      (buttonClick)="handleRetry()"
    />
  } @else if (cardData$ | async; as data) {
    <div class="card-details__header">
      <app-button
        variant="ghost"
        [icon]="'left-arrow.svg'"
        (click)="handleBack()"
      >
        Back to Cards
      </app-button>
    </div>

    <app-card-image
      [imageBase64]="data.imageBase64"
      [cardName]="data.details.cardName"
    />

    <app-basic-card
      title="Card Information"
      subtitle="Details about your Personal Card"
      maxWidth="100%"
      padding="2rem"
    >
      <app-card-info-section
        [cardName]="data.details.cardName"
        [cardType]="data.details.type"
        [currency]="(currency$ | async) || 'N/A'"
        [status]="data.details.status"
        [isActiveStatus]="(isActiveStatus$ | async) || false"
        [formattedBalance]="(formattedBalance$ | async) || 'N/A'"
        [shouldShowCreditLimit]="(shouldShowCreditLimit$ | async) || false"
        [formattedCreditLimit]="(formattedCreditLimit$ | async) || 'N/A'"
      />
    </app-basic-card>

    <app-basic-card
      title="Quick Actions"
      subtitle="Manage your card and transactions"
      maxWidth="100%"
      padding="2rem"
    >
      <app-quick-actions-section
        (transferOwnClicked)="handleTransferOwn()"
        (transferExternalClicked)="handleTransferExternal()"
        (paybillClicked)="handlePaybill()"
        (viewTransactionsClicked)="handleViewTransactions()"
      />
    </app-basic-card>
  }
</div>
