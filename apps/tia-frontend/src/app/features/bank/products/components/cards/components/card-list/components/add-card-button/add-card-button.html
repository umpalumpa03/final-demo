<app-basic-card
  [hasHover]="true"
  [maxWidth]="'100%'"
  [display]="'flex'"
  [flexDirection]="'column'"
  [alignItems]="'center'"
  [justifyContent]="'center'"
  [minHeight]="'22rem'"
  [borderColor]="'var( --color-gray-200)'"
  [gap]="'0.8rem'"
  (click)="handleClick()"
>
  <app-button
    size="icon"
    [variant]="'ghost'"
    [icon]="'adding.svg'"
    type="button"
  />
  <span class="add-card-button__text">Get New Card</span>
</app-basic-card>
