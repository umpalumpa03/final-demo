<div class="design-selector">
  <label class="design-selector__label">Choose Card Design</label>
  <div class="design-selector__grid">
    @if (isLoading()) {
    <app-skeleton width="100%" height="12rem" />
    <app-skeleton width="100%" height="12rem" />
    <app-skeleton width="100%" height="12rem" />
    <app-skeleton width="100%" height="12rem" />
    <app-skeleton width="100%" height="12rem" />
    } @else { @for (design of designs(); track design.id) {
    <div
      class="design-selector__option"
      [class.design-selector__option--selected]="selectedDesign() === design.id"
      (click)="onSelectDesign(design.id)"
      (keydown.enter)="onSelectDesign(design.id)"
      (keydown.space)="onSelectDesign(design.id)"
      role="button"
      tabindex="0"
      [attr.aria-label]="design.designName"
    >
      <div class="design-selector__preview">
        <img
          [src]="design.uri"
          [alt]="design.designName"
          class="design-selector__image"
        />
        @if (selectedDesign() === design.id) {
        <div class="design-selector__check">
          <img
            [src]="'/images/svg/cards/selected.svg'"
            alt="Account"
            class="card-group-item__icon"
          />
        </div>
        }
      </div>
      <span class="design-selector__name">{{ design.designName }}</span>
    </div>
    } }
  </div>
</div>
