<div class="global-bank-wrapper">
  <app-drag-container
    [items]="myItems()"
    [layout]="'grid'"
    [columns]="{ default: 2, md: 1, sm: 1 }"
    [colspans]="dynamicColspans()"
    containerTitle=""
    containerDescription=""
    (itemsChange)="onItemsChange($event)"
    (orderChange)="onContainerOrderChange($event)"
  >
    @for (item of myItems(); track item.id) {
      <app-draggable-card
        [itemData]="item"
        [canDelete]="true"
        [editable]="true"
        (remove)="onRemove(item.id)"
        (edit)="onEdit(item.id)"
        appDragItem
      >
        <div class="widget-content">
          <div class="widget-content__metric">PLACEHOLDER</div>
          <p class="widget-content__label">{{ item.subtitle }}</p>
        </div>
      </app-draggable-card>
    }
  </app-drag-container>
</div>
