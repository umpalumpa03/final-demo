<button
  class="customize-button"
  [class.customize-button--square]="!label()"
  [style.max-width]="!label() ? 'none' : customMaxSize()"
  (click)="clicked.emit()"
>
  <div class="customize-button__content">
    <div class="icon icon__customize"></div>
    @if (label()) {
    <span class="customize-button__text">{{ label() | translate }}</span>
    }
  </div>

  @if(!hideIcon() && label()){
  <div class="icon icon__arrow__right"></div>
  }
</button>
