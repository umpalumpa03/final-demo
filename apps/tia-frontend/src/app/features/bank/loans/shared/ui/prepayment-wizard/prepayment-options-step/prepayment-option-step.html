<div class="prepayment-step">
    <header class="prepayment-step__header">
        <div class="prepayment-step__header-icon">
            <img src="./images/svg/feature-loans/prepayment.svg" alt="Prepayment">
            <h3 class="prepayment-step__title">Loan Prepayment</h3>
        </div>
        <p class="prepayment-step__subtitle">Select prepayment options and calculate</p>
    </header>

    <form [formGroup]="form" class="prepayment-step__body">
        <h4 class="prepayment-step__section-title">Prepayment Options</h4>

        <div class="prepayment-step__form-grid">
            <lib-select [config]="{ label: 'Prepayment Type *', height: '3.6rem', placeholder: 'Select type' }"
                [options]="(typeOptions$ | async) ?? []" formControlName="type">
            </lib-select>

            <lib-text-input type="number" [config]="{ 
                    label: 'Prepayment Amount *', 
                    placeholder: '500', 
                    prefixIcon: './images/svg/feature-loans/dollar.svg'
                }" formControlName="amount">
            </lib-text-input>
        </div>

        <div class="prepayment-step__radios">
            <lib-radios [config]="{ 
                    label: 'Calculation Option *', 
                    hasBorder: true,
                    layout: 'column'
                }" [options]="calculationOptions" formControlName="calculationOption">
            </lib-radios>
        </div>
    </form>

    <footer class="prepayment-step__footer">
        <app-button variant="outline" (click)="cancel.emit()">Cancel</app-button>

        <app-button icon="./calculate.svg" [isDisabled]="form.invalid && form.get('type')?.value !== 'full'"
            (click)="onCalculate()">
            Calculate Prepayment
        </app-button>
    </footer>
</div>
