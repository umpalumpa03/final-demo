<div class="prepayment-step">
    <header class="prepayment-step__header">
        <div class="prepayment-step__header-icon">
            <img src="./images/svg/feature-loans/prepayment.svg" alt="Prepayment">
            <h3 class="prepayment-step__title">{{ 'loans.prepayment_wizard.step_setup.title' | translate }}</h3>
        </div>
        <p class="prepayment-step__subtitle">{{ 'loans.prepayment_wizard.step_setup.subtitle' | translate }}</p>
    </header>

    <form [formGroup]="form" class="prepayment-step__body">
        <h4 class="prepayment-step__section-title">{{ 'loans.prepayment_wizard.step_setup.section' | translate }}</h4>

        <div class="prepayment-step__form-grid">
            <lib-select [config]="cfg().typeSelect" [options]="(typeOptions()) ?? []" formControlName="type">
            </lib-select>

            <lib-text-input type="number" [config]="cfg().amountInput" formControlName="amount">
            </lib-text-input>
        </div>

        <div class="prepayment-step__radios">
            <lib-radios [config]="cfg().calculationRadios" [options]="calculationOptions()"
                formControlName="calculationOption">
            </lib-radios>
        </div>
    </form>

    <footer class="prepayment-step__footer">
        <app-button variant="outline" (click)="cancel.emit()">
            {{ 'loans.buttons.cancel' | translate }}
        </app-button>

        <app-button [icon]="isLoading() ? null : './calculate.svg'"
            [isDisabled]="(form.invalid && form.get('type')?.value !== 'full') || isLoading()" [isLoading]="isLoading()"
            (click)="onCalculate()">
            {{ 'loans.prepayment_wizard.step_setup.button' | translate }}
        </app-button>
    </footer>
</div>
