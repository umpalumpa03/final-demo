<div class="review-step">
    <header class="review-step__header">
        <div class="review-step__header-text">
            <div class="icon">
                <img src="./images/svg/feature-loans/prepayment.svg" alt="Prepayment">
                <h3 class="review-step__title">Prepayment Calculation</h3>
            </div>
            <p class="review-step__subtitle">Review the prepayment details and proceed</p>
        </div>
    </header>

    <div class="review-step__body">
        <div class="review-step__section">
            <h4 class="review-step__section-title">Prepayment Information</h4>

            <div class="review-step__grid">
                @for (item of calculationResult().displayedInfo; track item.text) {
                <div class="review-step__grid-item">
                    <label class="review-step__label">{{ item.text }}</label>
                    <strong class="review-step__value">
                        {{ item.amount | currency:'USD':'symbol':'1.0-2' }}
                    </strong>
                </div>
                }
            </div>
        </div>
    </div>

    <footer class="review-step__footer">
        <app-button variant="outline" (click)="cancel.emit()">Cancel</app-button>
        <app-button variant="default" icon="./right-arrow.svg" (click)="confirmPay.emit()">
            Pay
        </app-button>
    </footer>
</div>
