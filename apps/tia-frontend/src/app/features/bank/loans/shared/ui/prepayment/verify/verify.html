<div class="otp-step">
    <app-otp-verification type="otp" timerType="otp" [timeLimit]="1" [remainingAttempts]="3" [isTimerDisplayed]="false"
        [isLoading]="isLoading()" [errorMessage]="errorMessage()" [inputOtpConfig]="verifyState.otpConfig()"
        (isVerifyCalled)="onVerify($event)" [noMoreAttempsRedirectRoute]="routes.ALL" (onBackOut)="cancel.emit()">
    </app-otp-verification>
</div>
