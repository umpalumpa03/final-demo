<div class="loans">
    @for (loan of pendingLoans(); track loan.id) {
    <lib-loan-card [loan]="loan" [variant]="'colored'" (rename)="onRenameLoan($event)">
    </lib-loan-card>
    } @empty {
    <app-error-states variant="not-found" [header]="'loans.empty.pending.title' | translate"
        [message]="'loans.empty.pending.message' | translate" [border]="false" width="100%" height="30rem"
        (buttonClick)="navigateToAllLoans()">
    </app-error-states>
    }
</div>
