<div class="loans">
    @for (loan of approvedLoans(); track loan.id) {
    <lib-loan-card [loan]="loan" [variant]="'colored'" (cardClick)="onCardClick($event)"
        (rename)="onRenameLoan($event)">
    </lib-loan-card>
    } @empty {
    <app-error-states variant="not-found" [header]="'loans.empty.approved.title' | translate"
        [message]="'loans.empty.approved.message' | translate" [border]="false" width="100%" height="30rem"
        (buttonClick)="navigateToAllLoans()">
    </app-error-states>
    }
</div>
<app-loan-details [isOpen]="isDetailsOpen()" [loan]="selectedLoanDetails()" [isLoading]="isDetailsLoading()"
    (calculatePrepayment)="onOpenPrepayment($event)" (close)="closeModals()">
</app-loan-details>

<app-ui-modal [isOpen]="isPrepaymentOpen()" (closed)="closeModals()">
    @let prepayment = prepaymentLoan();
    @if (prepayment) {
    <app-prepayment-container [loan]="prepayment" (close)="closeModals()">
    </app-prepayment-container>
    }
</app-ui-modal>
