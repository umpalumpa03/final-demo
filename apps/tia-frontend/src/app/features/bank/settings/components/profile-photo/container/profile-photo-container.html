<app-profile-photo
  [defaultAvatars]="defaultAvatars()"
  [defaultAvatarsLoading]="defaultAvatarsLoading()"
  [selectedAvatarId]="selectedAvatarId()"
  [photoUrl]="currentAvatarUrl()"
  [initials]="userInitials()"
  [isUploadModalOpen]="isUploadModalOpen()"
  [isDragOver]="isDragOver()"
  [savingChanges]="savingChanges()"
  [mainAvatarLoading]="mainAvatarLoading()"
  [defaultAvatarsLoadingMap]="defaultAvatarsLoadingMap()"
  (openUploadModal)="onOpenUploadModal()"
  (uploadModalClosed)="onCloseUploadModal()"
  (dragOver)="onDragOver($event)"
  (dragLeave)="onDragLeave($event)"
  (fileDrop)="onFileDrop($event)"
  (fileInputChange)="onFileInputChange($event)"
  (removePhoto)="onRemovePhoto()"
  (saveChanges)="onSaveChanges()"
  (selectDefaultAvatar)="onSelectDefaultAvatar($event)"
  (imageError)="onImageLoadError()"
  (mainImageLoad)="onMainImageLoad()"
  (defaultAvatarLoad)="onDefaultAvatarLoad($event)"
  (defaultAvatarError)="onDefaultAvatarError($event)"
>
</app-profile-photo>

<app-user-info
  [pId]="pId()"
  [phoneNumber]="phoneNumber()"
  [personalInfoLoading]="personalInfoLoading()"
  [personalInfoUpdated]="personalInfoUpdated()"
  [personalInfoError]="personalInfoError()"
  [editedPId]="editedPId()"
  [isEditing]="isEditing()"
  [isPersonalNumberUnchanged]="isPersonalNumberUnchanged()"
  [editedPhoneNumber]="editedPhoneNumber()"
  [isPhoneNumberUnchanged]="isPhoneNumberUnchanged()"
  [phoneUpdateLoading]="phoneUpdateLoading()"
  [saveDisabledReason]="saveDisabledReason()"
  (edit)="onEdit()"
  (personalNumberChange)="onPersonalNumberChange($event)"
  (phoneNumberChange)="onPhoneNumberChange($event)"
  (cancelEdit)="onCancelEdit()"
  (save)="onSave()"
  (startTour)="onStartTour()"
></app-user-info>

@if (isOtpModalOpen()) {
<app-ui-modal [isOpen]="isOtpModalOpen()" (closed)="onOtpModalClosed()">
  <app-otp-verification
    type="otp"
    timerType="otp"
    [inputOtpConfig]="otpConfig"
    [errorMessage]="phoneUpdateError()"
    [isButtonLoading]="phoneUpdateLoading()"
    [onErrorRedirect]="false"
    (isVerifyCalled)="onVerifyOtp($event)"
    (isResendCalled)="onResendOtp()"
    (onBackOut)="onOtpModalClosed()"
    [otpResendType]="otpResendType"
  ></app-otp-verification>
</app-ui-modal>
}
