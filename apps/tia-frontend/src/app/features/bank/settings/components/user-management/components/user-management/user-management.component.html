@let cfg = userState.newConfig();
<main>
    <div class="search-box">
        <lib-text-input [config]="cfg" type="search" (valueChange)="onSearch($event)">
        </lib-text-input>
    </div>

    @for (user of visibleUsers(); track user.id) {
    <app-user-card [user]="user" (onDetails)="details(user.id)">
    </app-user-card>
    }

    <app-user-details-modal [isOpen]="modalState() === 'details'" [userData]="store.selectedUser()"
        [isLoading]="store.actionLoading()" (close)="onCloseModal()">
    </app-user-details-modal>

    <app-pagination [currentPage]="currentPage()" [totalPages]="totalPages()" (pageChange)="onPageChange($event)">
    </app-pagination>
</main>
