<footer class="loan-drawer__footer">
  @if (!showDeclineForm()) {
    <button
      class="loan-drawer__btn loan-drawer__btn--outline"
      (click)="onClose()"
    >
      {{ labels().close }}
    </button>
    <button
      class="loan-drawer__decline-btn"
      [disabled]="!loanDetails() || isActionLoading()"
      (click)="onShowDecline()"
      aria-label="Decline"
    >
      <img
        class="loan-drawer__action-icon"
        src="images/svg/button-icons/red_X.svg"
        alt="Decline"
      />
      {{ labels().decline }}
    </button>
    <button
      class="loan-drawer__btn loan-drawer__btn--success"
      [class.loan-drawer__btn--loading]="isActionLoading()"
      [disabled]="!canApprove()"
      (click)="onApprove()"
    >
      @if (isActionLoading()) {
        <span class="loan-drawer__btn-spinner"></span>
      } @else {
        <img
          class="loan-drawer__action-icon"
          src="images/svg/button-icons/approve.svg"
          alt="Approve"
        />
        {{ labels().approve }}
      }
    </button>
  } @else {
    <button
      class="loan-drawer__btn loan-drawer__btn--outline"
      [disabled]="isActionLoading()"
      (click)="onCancelDecline()"
    >
      {{ labels().cancel }}
    </button>
    <button
      class="loan-drawer__btn loan-drawer__btn--destructive"
      [class.loan-drawer__btn--loading]="isActionLoading()"
      [disabled]="!canDecline()"
      (click)="onConfirmDecline()"
    >
      @if (isActionLoading()) {
        <span class="loan-drawer__btn-spinner"></span>
      } @else {
        {{ labels().confirmDecline }}
      }
    </button>
  }
</footer>
