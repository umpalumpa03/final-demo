<app-ui-modal [isOpen]="isOpen()" (closed)="!isLoading() && close.emit()">
    <div class="modal">
        <header>
            <img src="./images/svg/settings/user-management/user-delete.svg" alt="Delete Trash Icon">
            <h1> {{'settings.user-management.delete.title' | translate}}</h1>
        </header>

        <p>{{'settings.user-management.delete.desc' | translate}}</p>

        <footer>
            <app-button variant="outline" [isDisabled]="isLoading()" (click)="close.emit()">
                {{'settings.user-management.delete.cancel' | translate}}
            </app-button>

            <app-button variant="destructive" icon="./trash-icon.svg" [isDisabled]="isLoading()"
                [isLoading]="isLoading()" (click)="deleteUser.emit()">
                {{'settings.user-management.delete.delete' | translate}}
            </app-button>
        </footer>
    </div>
</app-ui-modal>
