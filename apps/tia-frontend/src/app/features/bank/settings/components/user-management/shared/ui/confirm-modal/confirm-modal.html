<app-ui-modal [isOpen]="isOpen()" (closed)="!isLoading() && close.emit()">
    <div class="modal">
        <header>
            <img src="./images/svg/settings/user-management/delete.svg" alt="">
            <h1>Delete User</h1>
        </header>

        <p>Are you sure you want to delete this user? This action cannot be undone.</p>

        <footer>
            <app-button variant="outline" [isDisabled]="isLoading()" (click)="close.emit()">
                Cancel
            </app-button>

            <app-button variant="destructive" [icon]="isLoading() ? null : './trash-icon.svg'"
                [isDisabled]="isLoading()" [isLoading]="isLoading()" (click)="deleteUser.emit()">
                Delete
            </app-button>
        </footer>
    </div>
</app-ui-modal>
