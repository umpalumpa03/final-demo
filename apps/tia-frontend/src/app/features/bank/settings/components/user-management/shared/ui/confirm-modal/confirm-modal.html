<app-ui-modal [isOpen]="isOpen()" (closed)="close.emit()">
    <div class="modal">
        <header>
            <img src="./images/svg/settings/user-management/delete.svg">
            <h1>Delete User</h1>
        </header>
        <p>Are you sure you want to delete this user? This action cannot be undone.</p>
        <footer>
            <app-button variant="outline" (click)="close.emit()">Cancel</app-button>
            <app-button variant="destructive" icon="trash-icon.svg" (click)="delete.emit()">Cancel</app-button>
        </footer>
    </div>
</app-ui-modal>
