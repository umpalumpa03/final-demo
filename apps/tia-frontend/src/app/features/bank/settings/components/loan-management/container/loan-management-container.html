<div class="loan-card">
  <div class="loan-header">
    <h3 class="loan-header__title">{{ config().title }}</h3>
    <p class="loan-header__subtitle">{{ config().subtitle }}</p>
  </div>
  <div class="loan-management-container">
    @if (store.loading() && !store.hasInitialLoad()) {
      <div class="loan-management-container__skeletons">
        @for (item of [1, 2, 3, 4]; track item) {
          <app-basic-card minHeight="13rem" padding="2.4rem" maxWidth="100%" flexDirection="row" gap="0">
            <div class="skeleton-card">
              <app-skeleton variant="circle" width="5rem" height="5rem"></app-skeleton>
              <div class="skeleton-card__content">
                <app-skeleton width="50%" height="1.8rem"></app-skeleton>
                <app-skeleton width="35%" height="1.4rem"></app-skeleton>
                <div class="skeleton-card__details">
                  <app-skeleton width="6rem" height="1.4rem"></app-skeleton>
                  <app-skeleton width="8rem" height="1.4rem"></app-skeleton>
                </div>
              </div>
            </div>
          </app-basic-card>
        }
      </div>
    } @else {
      <app-pending-approvals-table
        [approvals]="store.sortedPendingApprovals()"
        [error]="store.error()"
        (rowClick)="onRowClick($event)"
        (reload)="onReload()"
      ></app-pending-approvals-table>
    }
  </div>
</div>
<app-loan-case-drawer
  [isOpen]="!!store.selectedLoanId()"
  [loanDetails]="store.selectedLoanDetails()"
  [loanDetailsResponse]="store.selectedLoanDetailsResponse()"
  [userInfo]="store.selectedUserInfo()"
  [isUserInfoLoading]="store.userInfoLoading()"
  [isLoanDetailsLoading]="store.loanDetailsLoading()"
  [isActionLoading]="store.actionLoading()"
  (closed)="onDrawerClose()"
  (approve)="onApprove($event)"
  (reject)="onReject($event)"
></app-loan-case-drawer>
