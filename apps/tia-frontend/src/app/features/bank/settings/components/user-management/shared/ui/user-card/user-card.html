<app-basic-card minHeight="11.4rem" padding="1.8rem" maxWidth="100%" flexDirection="row" gap="0">
    <div class="user-card__left">
        <div class="user-card__avatar">
            <img src="./images/svg/settings/user-management/person.svg" alt="Avatar">
        </div>

        <div class="user-card__info">
            <h3 class="user-card__name">
                {{ user().firstName }} {{ user().lastName }}
            </h3>
            <p class="user-card__email">{{ user().email }}</p>
            <div class="user-card__meta">
                <span class="user-card__role">{{ user().role | lowercase }}</span>
                <span class="user-card__status" [class.text-danger]="user().isBlocked">
                    {{ user().isBlocked ? 'Blocked' : 'Active' }}
                </span>
            </div>
        </div>
    </div>

    <div class="user-card__actions">
        <button class="action-btn">
            <app-button variant="outline" icon="./details.svg" (click)="onDetails.emit(user().id)">
                Details
            </app-button>
        </button>

        <button class="action-btn">
            <app-button variant="outline" icon="./edit.svg" (click)="onEdit.emit(user().id)">
                Edit
            </app-button>
        </button>

        <button class="action-btn">
            <app-button variant="outline" icon="./delete.svg" (click)="onDelete.emit(user().id)">
                Delete
            </app-button>
        </button>

        <button class="action-btn">
            @if (!user().isBlocked) {
            <app-button [isLoading]="isLoading()" [isDisabled]="isLoading()" variant="outline" icon="./block.svg"
                (click)="toggleBlock()">
                Block
            </app-button>
            } @else {
            <app-button [isLoading]="isLoading()" [isDisabled]="isLoading()" variant="outline" icon="./unblock.svg"
                (click)="toggleBlock()">
                Unblock
            </app-button>
            }
        </button>
    </div>
</app-basic-card>
