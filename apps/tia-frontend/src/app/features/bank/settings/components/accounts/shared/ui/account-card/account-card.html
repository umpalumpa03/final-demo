<app-basic-card
  maxWidth="100%"
  minHeight="11.4rem"
  padding="1.8rem"
  borderColor="#E5E7EB"
  alignItems="center"
  gap="0"
  flexDirection="row"
>
  <div class="account-card">
    <div class="account-card__inner">
      <div class="account-card__left">
        <div class="account-card__avatar">
          <img src="" [src]="accountIcon()" class="account-card__avatar-icon" />
        </div>
        <div class="account-card__content">
          <div class="account-card__title-row">
            <h3 class="account-card__title">{{name()}}</h3>
            @switch(badge()) { @case('Hidden') {
            <app-badges
              [text]="badge()"
              variant="outline"
              shape="rounded"
              size="small"
            ></app-badges>
            } @case('Favorite') {
            <app-badges
              status="favorite"
              [text]="badge()"
              customColor="amber"
            ></app-badges>
            } @default { } }
          </div>
          <div class="account-card__number">{{iban()}}</div>
          <div class="account-card__meta">
            <span class="account-card__type">{{type()}}</span>
            <span class="account-card__balance"
              >{{currency()}} {{balance()}}</span
            >
          </div>
        </div>
      </div>

      <div class="account-card__actions">
        <app-button
          [isLoading]="isChangeNameLoading()"
          variant="outline"
          size="small"
          iconWidth="1.4rem"
          iconHeight="1.4rem"
          icon="edit.svg"
          (click)="onFriendlyNameClick()"
          >Change name</app-button
        >
        <app-button
          [variant]="isFavorite() ? 'default' : 'outline'"
          size="small"
          iconWidth="1.4rem"
          iconHeight="1.4rem"
          [customColor]="isFavorite()? '#F0B100' : ''"
          (click)="onFavoriteClick()"
          [icon]="isFavorite() ? 'favorited.svg' : 'non-favorite.svg'"
          [isLoading]="isFavoriteLoading()"
        >
          {{ isFavorite() ? 'Favorited' : 'Favorite' }}
        </app-button>

        <app-button
          [isLoading]="isVisibilityLoading()"
          variant="outline"
          size="small"
          iconWidth="1.4rem"
          iconHeight="1.4rem"
          (click)="onHideUnhideClick()"
          [icon]="isHidden() ? 'eye.svg' : 'eye-hide.svg'"
        >
          {{ isHidden() ? 'Show' : 'Hide' }}
        </app-button>
      </div>
    </div>
  </div>
</app-basic-card>
