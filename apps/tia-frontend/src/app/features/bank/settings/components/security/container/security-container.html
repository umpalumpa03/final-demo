@if (alertType()) {
  <div class="security-container__alert-container">
    <app-alert-types-with-icons
      class="security-container__alert"
      [alertType]="alertType()!"
      [alertMessage]="alertMessage()"
    ></app-alert-types-with-icons>
  </div>
}

<app-security
  [isLoading]="isLoading()"
  [error]="error()"
  [success]="success()"
  [form]="changePasswordForm"
  (changePassword)="onChangePassword($event)"
></app-security>
