<div class="settings">
  <h1 class="settings__title">{{'settings.title' | translate}}</h1>
  <p class="settings__desc">{{'settings.subtitle' | translate}}</p>
  <nav class="settings__header-nav">

    <app-tabs [tabs]="navItems()" orientation="horizontal" [collapsed]="isMobile()" />

    @if (isAdmin()) {
      <app-tabs [tabs]="adminNavItems" [collapsed]="isMobile()" />
    }

  </nav>
</div>
