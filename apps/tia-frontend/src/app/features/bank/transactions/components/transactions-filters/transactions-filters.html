<app-showcase-card>
  <div class="filters-heading">
    <app-library-title
      [title]="'Filters'"
      [subtitle]="'Apply filters to refine your transaction list'"
    ></app-library-title>
    @if(hasActiveFilter()){
    <app-button
      [type]="'reset'"
      [variant]="'outline'"
      [icon]="'x-icon.svg'"
      (click)="resetFilters()"
      >Reset All</app-button
    >
    }
  </div>

  <form [formGroup]="filterForm" class="transaction-filters-form">
    @for (field of filtersConfig(); track field.controlName) {

    <div class="transaction-filters-form__input-wrapper">
      @if (field.type === 'select') {
      <lib-select
        [formControlName]="field.controlName"
        [options]="field.options || []"
        [config]="field.uiConfig"
      >
      </lib-select>
      } @else {
      <lib-text-input
        [formControlName]="field.controlName"
        [type]="field.inputType || 'text'"
        [config]="field.uiConfig"
      >
      </lib-text-input>
      }
    </div>
    }
  </form>

  @if (activeFilters().length > 0) {
  <div class="active-filters-container">
    @for (filter of activeFilters(); track filter.key) {
    <app-button
      [variant]="'outline'"
      [icon]="'x-icon.svg'"
      (click)="removeFilter(filter.key)"
    >
      {{ filter.displayText }}
    </app-button>
    }
  </div>
  }
</app-showcase-card>
