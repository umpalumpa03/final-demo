<app-basic-card
  [minWidth]="'100%'"
  [width]="'100%'"
  [padding]="'2.4rem'"
  [title]="'Filters'"
  [subtitle]="'Apply filters to refine your transaction list'"
>
  <div class="transactions-filters">
    <div class="transactions-filters__heading">
      @if(hasActiveFilter()){
      <app-button
        [type]="'reset'"
        [variant]="'outline'"
        [icon]="'x-icon.svg'"
        (click)="resetFilters()"
        >Reset All</app-button
      >
      }
    </div>

    <form [formGroup]="filterForm" class="transactions-filters__form">
      @for (field of filtersConfig(); track field.controlName) {

      <div class="transactions-filters__form__input-wrapper">
        @if (field.type === 'select') {
        <lib-select
          [formControlName]="field.controlName"
          [options]="field.options || []"
          [config]="field.uiConfig"
        >
        </lib-select>
        } @else {
        <lib-text-input
          [formControlName]="field.controlName"
          [type]="field.inputType || 'text'"
          [config]="field.uiConfig"
        >
        </lib-text-input>
        }
      </div>
      }
    </form>

    @if (activeFilters().length > 0) {
    <div class="transactions-filters__active-filters">
      @for (filter of activeFilters(); track filter.key) {
      <app-button
        [variant]="'outline'"
        [icon]="'x-icon.svg'"
        (click)="removeFilter(filter.key)"
      >
        {{ filter.displayText }}
      </app-button>
      }
    </div>
    }
  </div>
</app-basic-card>
