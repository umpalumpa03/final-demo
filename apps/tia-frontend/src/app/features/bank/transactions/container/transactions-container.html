<div class="global-bank-wrapper">
  <div class="transactions-wrapper">
    <app-library-title [title]="'Transactions'"> </app-library-title>
    <div
      (scroll)="onScroll($event)"
      class="transactions-wrapper__scroll-container"
    >
      <app-transactions-table
        [transactionsData]="tableConfig()"
      ></app-transactions-table>
    </div>
    <app-flex-layout
      >@if(isLoading() && items().length > 0){
      <app-button [isLoading]="true">Loading</app-button>
      }</app-flex-layout
    >
    @if(isLoading() && items().length === 0){
    <app-route-loader [variant]="'full-page'"></app-route-loader>
    }
  </div>
</div>
