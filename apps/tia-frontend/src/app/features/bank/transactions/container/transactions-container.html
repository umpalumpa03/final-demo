<div class="global-bank-wrapper">
  <app-library-title
    [title]="'transactions.title' | translate"
  ></app-library-title>
  <div class="transaction-filters-wrapper">
    <app-transactions-filters
      [categoryOptions]="facade.categoryOptions()"
      [accountOptions]="vm.accountOptions()"
      [currencyOptions]="vm.currencyOptions()"
      (filterChange)="facade.updateFilters($event)"
    ></app-transactions-filters>
  </div>
  @if (actions.alertMessage()) {
  <div class="alert-message">
    <app-simple-alerts
      [alertType]="actions.alertType()"
      [alertMessage]="actions.alertMessage()!"
    >
    </app-simple-alerts>
  </div>
  }
  <app-basic-card
    [maxWidth]="'100%'"
    [width]="'100%'"
    [padding]="'2.4rem'"
    [height]="'calc(100vh - 45.4rem)'"
    [title]="'transactions.title' | translate"
    [subtitle]="vm.totalTransactionsString()"
  >
    <app-scroll-area
      [height]="'calc(calc(100vh - 45.4rem) - 12rem)'"
      [hideBorder]="true"
      (scrollBottom)="facade.loadMore()"
    >
      @if(facade.isLoading() && facade.items().length === 0){
      <app-route-loader variant="pulsing" [fillContainer]="true">
      </app-route-loader>
      } @else {
      <app-tables
        [tableConfig]="vm.tableConfig()"
        (transactionClickedOutput)="onTableAction($event)"
      ></app-tables>
      } @if(facade.isLoading() && facade.items().length > 0){
      <div class="loading-more">
        <app-route-loader variant="pulsing"></app-route-loader>
      </div>
      }
    </app-scroll-area>
  </app-basic-card>
  <app-ui-modal
    [isOpen]="actions.isCategorizeModalOpen()"
    (closed)="actions.closeCategorizeModal()"
  >
    @if(actions.selectedTransaction(); as trx) {
    <app-categorize-modal
      [transaction]="trx"
      [selectCategoryOptions]="facade.categoryOptionsForModal()"
      (save)="actions.saveCategory($event.transactionId, $event.categoryId)"
      (cancel)="actions.closeCategorizeModal()"
      (createCategory)="facade.createCategory($event)"
    ></app-categorize-modal>
    }
  </app-ui-modal>
</div>
