<div class="wildcard">
  <div class="wildcard__content">
    <h1 class="wildcard__title">404</h1>
    <h2 class="wildcard__subtitle">Page Not Found</h2>
    <p class="wildcard__description">
      We're sorry, the requested page could not be found or is no longer available.
    </p>
    <app-button 
      variant="default" 
      size="large" 
      (click)="navigateToLibrary()">
      Back to Home
    </app-button>
  </div>
</div>
