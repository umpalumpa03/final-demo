<div class="navigation">
  <app-library-title
    title="Navigation Components"
    subtitle="Navigation components including tabs, breadcrumbs, and pagination"
  >
  </app-library-title>
  <app-showcase-card title="Tabs">
    <div class="navigation__card">
      <app-tabs [tabs]="tabs()" [orientation]="'horizontal'"></app-tabs>
      <div class="navigation__card--title">
        <h4 class="navigation__card--title-heading">Overview Content</h4>
        <p class="navigation__card--title-desc">
          This is the overview tab content. It displays general information.
        </p>
        <router-outlet></router-outlet>
      </div>
    </div>
  </app-showcase-card>
  <app-showcase-card title="Tabs">
    <div class="navigation__card">
      <app-tabs [tabs]="tabs2()" [orientation]="'vertical'"></app-tabs>
      <div class="navigation__card--title">
        <h4 class="navigation__card--title-heading">Account Settings</h4>
        <p class="navigation__card--title-desc">
          Manage your account settings and preferences.
        </p>
      </div>
    </div>
  </app-showcase-card>

  <app-showcase-card title="Breadcrumbs">
    <div class="navigation__card">
      <div class="navigation__card__example">
        <h4 class="navigation__card__example__heading">Default Breadcrumbs:</h4>
        <app-breadcrumbs [breadcrumbs]="breadcrumbs()"></app-breadcrumbs>
      </div>
      <div class="navigation__card__example">
        <h4 class="navigation__card__example__heading">With Icons:</h4>
        <app-breadcrumbs [breadcrumbs]="breadcrumbs2()"></app-breadcrumbs>
      </div>
      <div class="navigation__card__example">
        <h4 class="navigation__card__example__heading">Long Path:</h4>
        <app-breadcrumbs [breadcrumbs]="breadcrumbs3()"></app-breadcrumbs>
      </div>
    </div>
  </app-showcase-card>
  <app-showcase-card title="Pagination">
    <div class="navigation__card">
     <app-pagination-component></app-pagination-component>
    </div>
  </app-showcase-card>
</div>
