<div class="drag-card-frame">
  <div class="drag-card-frame__header">
    <h2>Draggable Cards</h2>
    <p>Drag Cards to reorder them in a grid layout</p>
  </div>
  <div class="draggable-cards">
    @for (item of items; track $index) {
    <app-draggable-card
      [itemData]="item"
      [index]="$index"
      [isDragging]="draggingIndex() === $index"
      [style.transform]="draggingIndex() === $index ? 'translate(' + currentX() + 'px, ' + currentY() + 'px)' : ''"
      [style.z-index]="draggingIndex() === $index ? 100 : 0"
      (dragStart)="onDragStart($event.index, $event.event)"
      (remove)="onRemove($event)"
    />
    }
  </div>
</div>
