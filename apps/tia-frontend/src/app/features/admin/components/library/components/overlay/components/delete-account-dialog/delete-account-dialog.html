<app-button variant="destructive" (click)="toggle()">
  Delete Account
</app-button>

<app-ui-modal [isOpen]="isOpen()" (closed)="toggle()">
  <div class="delete-account">
    <header class="delete-account__header">
      <app-library-title
        [title]="dialogTitle"
        [subtitle]="dialogSubtitle"
      ></app-library-title>
    </header>

    <footer class="delete-account__footer">
      <app-button variant="outline" (click)="toggle()"> Cancel </app-button>
      <app-button variant="destructive" (click)="toggle()">
        Delete Account
      </app-button>
    </footer>
  </div>
</app-ui-modal>
