<div class="cards-page">
  <app-library-title [title]="pageTitle" [subtitle]="pageSubtitle" />

  <section class="cards-section">
    <h2 class="cards-section__title">Basic Cards</h2>
    <div class="cards-section__grid">
      @for (card of basicCards(); track $index) {
      <app-basic-card
        [title]="card.title"
        [subtitle]="card.subtitle"
        [content]="card.content"
        [hasFooter]="card.hasFooter ?? false"
      >
        <div class="card-footer" card-footer>
          <app-button size="default" variant="outline">Cancel</app-button>
          <app-button size="default" variant="default">Submit</app-button>
        </div>
      </app-basic-card>
      }
    </div>
  </section>

  <section class="cards-section">
    <h2 class="cards-section__title">Statistics Cards</h2>
    <div class="cards-section__grid cards-section__grid--stats">
      @for (card of statisticsCards(); track $index) {
      <app-statistic-card
        [label]="card.label"
        [value]="card.value"
        [change]="card.change"
        [changeType]="card.changeType"
        [icon]="card.icon"
      />
      }
    </div>
  </section>
</div>
