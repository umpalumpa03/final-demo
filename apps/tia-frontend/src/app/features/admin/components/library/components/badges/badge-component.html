<div class="badge-demo">
  <h3 class="badge-demo__title">Variants</h3>
  
  <div class="badge-demo__row">
    @for (item of variants(); track $index) {
      <app-badges 
        [variant]="item.variant" 
        [text]="item.text">
      </app-badges>
    }
  </div>
</div>

<div class="badge-demo">
  <h3 class="badge-demo__title">Status Badges</h3>
  
  <div class="badge-demo__row">
    @for (item of statuses(); track $index) {
      <app-badges 
        [status]="item.status" 
        [text]="item.text">
      </app-badges>
    }
  </div>
</div>

<div class="badge-demo">
  <h3 class="badge-demo__title">Sizes</h3>
  
  <div class="badge-demo__row">
    @for (item of sizes(); track $index) {
      <app-badges 
        [size]="item.size" 
        [variant]="item.variant" 
        [text]="item.text">
      </app-badges>
    }
  </div>
</div>

<div class="badge-demo">
  <h3 class="badge-demo__title">Count Badges</h3>
  
  <div class="badge-demo__list">
    @for (item of countBadges(); track $index) {
      <app-badges 
        [label]="item.label" 
        [variant]="item.variant" 
        [text]="item.text">
      </app-badges>
    }
  </div>
</div>
