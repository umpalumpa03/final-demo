<button class="btn btn__trigger" (click)="toggle()">Confirm Action</button>

<app-ui-modal [isOpen]="isOpen()" (closed)="toggle()">
  <div class="confirm-content">
    <header class="confirm-content__header">
      <h2 class="confirm-content__title">Confirm your action</h2>
      <p class="confirm-content__description">
        Are you sure you want to proceed with this action?
      </p>
    </header>

    <footer class="confirm-content__footer">
      <button type="button" class="btn btn__outline" (click)="toggle()">
        Cancel
      </button>
      <button type="button" class="btn btn__primary" (click)="toggle()">
        Continue
      </button>
    </footer>
  </div>
</app-ui-modal>
