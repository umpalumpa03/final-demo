<div class="drag-frame">
  <div class="drag-frame__container">
    <div class="drag-frame__header">
      <h1 class="drag-frame__title">Drag & Drop Components</h1>
      <p class="drag-frame__description">
        Interactive drag-and-drop interfaces for reordering and organizing
        content
      </p>
    </div>
    <div class="drag-frame__content">
      <app-drag-card
        [items]="items"
        (itemsChange)="items = $event"
        (itemRemoved)="onItemRemoved($event)"
        [canDelete]="canDelete"
        layout="grid"
        [columns]="3"
      />
    </div>
  </div>
</div>
