<div class="showcase-container">
  <header class="showcase-header">
    <app-library-title
      [title]="pageTitle"
      [subtitle]="pageSubtitle"
    ></app-library-title>
  </header>

  <app-showcase-card title="Dialogs">
    <app-edit-profile-dialog></app-edit-profile-dialog>
    <app-form-dialog></app-form-dialog>
    <app-large-dialog></app-large-dialog>
  </app-showcase-card>

  <app-showcase-card title="Alert Dialogs">
    <app-delete-account-dialog></app-delete-account-dialog>
    <app-confirm-account-dialog></app-confirm-account-dialog>
  </app-showcase-card>

  <app-showcase-card title="Sheets (Side Panels)">
    <app-right-sheet-demo></app-right-sheet-demo>
    <app-left-sheet-demo></app-left-sheet-demo>
    <app-top-sheet-modal></app-top-sheet-modal>
    <app-bottom-sheet-modal></app-bottom-sheet-modal>
  </app-showcase-card>

  <app-showcase-card title="Drawers">
    <app-drawer-modal></app-drawer-modal>
  </app-showcase-card>

<app-showcase-card>
  <app-context-demo></app-context-demo>
</app-showcase-card>

  <section class="component-section palette-section">
    <h3>Command Palette</h3>
    <div class="command-palette-mock">
      <div class="command-input">
        <span class="search-icon"></span>
        <input type="text" placeholder="Type a command or search..." readonly />
      </div>
      <div class="command-results">
        <div class="result-group">
          <label for="name">Suggestions</label>
          <div class="result-item active">View Profile</div>
          <div class="result-item">Settings</div>
          <div class="result-item">Messages</div>
        </div>
        <div class="result-group">
          <label for="actions">Actions</label>
          <div class="result-item">Create New</div>
          <div class="result-item">Copy</div>
          <div class="result-item">Delete</div>
        </div>
      </div>
    </div>
  </section>
</div>
