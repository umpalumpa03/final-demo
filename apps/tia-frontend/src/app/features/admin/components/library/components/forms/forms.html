<div class="forms__lib">
  <header class="forms__lib__header">
    <app-library-title
      [title]="title"
      [subtitle]="subtitle"
    ></app-library-title>
  </header>
  <div class="forms__lib__forms">
    <h1>Contact Form</h1>
    <app-contact-form></app-contact-form>
  </div>

  <div class="forms__lib__forms">
    <h1>Registration Form</h1>
    <app-registration-form></app-registration-form>
  </div>

  <div class="forms__lib__forms">
    <h1>Inline Form</h1>
    <app-inline-form></app-inline-form>
  </div>

  <div class="forms__lib__forms">
    <h1>Form with Validation</h1>
    <app-validation-form></app-validation-form>
  </div>

  <div class="forms__lib__forms">
    <h1>Form Layout</h1>
    <app-layout-form></app-layout-form>
  </div>
</div>
