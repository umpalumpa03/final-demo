<form class="registration" [formGroup]="registrationForm" (ngSubmit)="submit()">
  <div class="registration__row">
    <div class="registration__field">
      <lib-text-input
        type="text"
        formControlName="firstName"
        [config]="inputConfigs.firstName"
      ></lib-text-input>
    </div>

    <div class="registration__field">
      <lib-text-input
        type="text"
        formControlName="lastName"
        [config]="inputConfigs.lastName"
      ></lib-text-input>
    </div>
  </div>

  <div class="registration__field">
    <lib-text-input
      type="email"
      formControlName="email"
      [config]="inputConfigs.email"
    ></lib-text-input>
  </div>

  <div class="registration__field">
    <lib-text-input
      type="password"
      formControlName="password"
      [config]="inputConfigs.password"
    ></lib-text-input>
  </div>

  <div class="registration__field">
    <lib-text-input
      type="password"
      [state]="confirmPasswordState"
      formControlName="confirmPassword"
      [config]="inputConfigs.confirmPassword"
    ></lib-text-input>
  </div>

  <div class="registration__field">
    <label class="registration__label" for="country">Country</label>
    <select
      formControlName="country"
      class="registration__input registration__select"
    >
      <option disabled selected>Select country</option>
      @for(country of countries; track country.code) {
      <option>{{ country.label }}</option>
      }
    </select>
  </div>

  <div class="registration__field">
    <lib-text-input
      type="date"
      formControlName="birthDate"
      [config]="inputConfigs.birthDate"
    ></lib-text-input>
  </div>

  <div class="registration__agree-terms">
    <lib-checkboxes
      formControlName="termsAndConditions"
      [config]="inputConfigs.termsAndConditions"
    ></lib-checkboxes>
  </div>

  <div class="registration__submit">
    <app-button type="submit" [fullWidth]="true">Create Account</app-button>
  </div>
</form>
