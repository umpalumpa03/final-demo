<div class="tables tables__wrapper">
  <header class="tables__header">
    <app-library-title
      title="Tables"
      subtitle="Table components for displaying structured data"
    ></app-library-title>
  </header>
  <div class="tables__section__wrapper">
    <section class="tables__basic">
      <app-showcase-card title="Basic Table">
        <app-tables [tableConfig]="basicConfig"></app-tables>
      </app-showcase-card>
    </section>
    <section class="tables__row--selection">
      <app-showcase-card title="Table with Row Selection">
        <app-tables [tableConfig]="rowConfig"> </app-tables>
      </app-showcase-card>
    </section>
    <section class="tables__action">
      <app-showcase-card title="Table with Actions">
        <app-tables [tableConfig]="actionsConfig"> </app-tables>
      </app-showcase-card>
    </section>
    <section class="tables__sortable">
      <app-showcase-card title="Sortable Table">
        <app-tables [tableConfig]="sortableConfig"> </app-tables>
      </app-showcase-card>
    </section>
    <section class="tables__strippd">
      <app-showcase-card title="Striped Table">
        <app-tables [tableConfig]="strippedConfig"> </app-tables>
      </app-showcase-card>
    </section>
  </div>
</div>
