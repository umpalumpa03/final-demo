<header class="header">
  <div class="container">
    <div class="container__heading">
      <h1>Component Library</h1>
      <p>
        A comprehensive showcase of all components with their various states
      </p>
    </div>
    <div class="container__color-switch">
      <div>
        <app-color-switch
          [color]="'ocean-blue'"
          [isActive]="true"
        ></app-color-switch>
        <app-color-switch [color]="'royal-blue'"></app-color-switch>
        <app-color-switch [color]="'deep-blue'"></app-color-switch>
      </div>
    </div>
  </div>
</header>
