<form class="validation__form" [formGroup]="contactForm">
  <div class="validation__form--fields">
    <lib-text-input
      state="success"
      type="email"
      formControlName="valid"
      [config]="validationConfig.success"
    ></lib-text-input>
  </div>

  <div class="validation__form--fields">
    <lib-text-input
      state="error"
      type="email"
      formControlName="invalid"
      [config]="validationConfig.error"
    ></lib-text-input>
  </div>

  <div class="validation__form--fields validation__form--warning">
    <lib-text-input
      state="warning"
      type="email"
      formControlName="warning"
      [config]="validationConfig.warning"
    ></lib-text-input>
  </div>
</form>
