<div class="alerts-page">
  <div class="alerts-page__title">
    <app-library-title [title]="pageTitle" [subtitle]="pageSubtitle" />
  </div>
  @for (section of alertSections; track section) {
  <app-showcase-card [title]="section">
    <div class="alerts-page__group">
     @switch (section) { 
        @case (titles.BASIC) { 
          @for (item of basicData; track item.id) {
            <app-basic-alerts 
                [alertType]="item.type" 
                [alertTitle]="item.title!" 
                [alertMessage]="item.message!"
              /> 
          }
        }

     }
    </div>
  </app-showcase-card>
  }
</div>
