<form class="contact__form" [formGroup]="contactForm" (ngSubmit)="submit()">
  <div class="contact__form__fields">
    <label [class.invalid]="isNameError" for="name">Name *</label>
    <input formControlName="name" type="text" placeholder="Your name" />
    @if (showError('email')) {
    <span class="error"> {{ nameError() }} </span>
    }
  </div>

  <div class="contact__form__fields">
    <label [class.invalid]="isEmailError" for="email">Email *</label>
    <input
      formControlName="email"
      type="email"
      placeholder="your.email@example.com"
    />
    @if (isEmailError) {
    <span class="error"> {{ emailError() }} </span>
    }
  </div>

  <div class="contact__form__fields">
    <label [class.invalid]="isMessageError" for="message"
      >Message *</label
    >
    <textarea
      formControlName="message"
      placeholder="Type your message here..."
    ></textarea>
    @if (isMessageError) {
    <span class="error"> {{ messageError() }} </span>
    }
  </div>

  <div class="contact__form__subscribe">
    <input formControlName="subscribe" type="checkbox" />
    <label [class.invalid]="isSubscribeError"
      >Subscribe to newsletter *</label
    >
  </div>

  <button type="submit">Submit</button>
</form>
