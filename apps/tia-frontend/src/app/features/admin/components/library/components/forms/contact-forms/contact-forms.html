<form class="contact__form" [formGroup]="contactForm" (ngSubmit)="submit()">
  <div class="contact__form--fields">
    <lib-text-input
      type="text"
      formControlName="name"
      [config]="nameConfig"
    ></lib-text-input>
  </div>

  <div class="contact__form--fields">
    <lib-text-input
      type="text"
      formControlName="email"
      [config]="emailConfig"
    ></lib-text-input>
  </div>

  <div class="contact__form--fields">
    <label [class.invalid]="isMessageError" for="message">Message *</label>
    <textarea
      formControlName="message"
      placeholder="Type your message here..."
    ></textarea>
    @if (isMessageError) {
    <span class="error"> {{ messageError() }} </span>
    }
  </div>

  <div class="contact__form--subscribe">
    <input formControlName="subscribe" type="checkbox" />
    <label [class.invalid]="isSubscribeError">Subscribe to newsletter *</label>
  </div>

  <button type="submit">Submit</button>
</form>
