<div class="container">
    <header>
        <app-library-title title="Layout Components" subtitle="Structural components for organizing content" />
    </header>
    <main>
        <app-showcase-card title="Separators">
            <div class="section-wrapper">
                <div class="section-wrapper__subsection">
                    <h4>Horizontal Separator:</h4>
                    <div class="example">
                        <span>Content above</span>
                        <app-separator orientation="horizontal" thickness="1px" color="#0EA5E9" margin="12px" />
                        <span>Content below</span>
                    </div>
                </div>
                <div class="section-wrapper__subsection">
                    <h4>Vertical Separator:</h4>
                    <div class="example-vertical">
                        <span>Left</span>
                        <app-separator orientation="vertical" thickness="0.1rem" [color]="color" margin="1.2rem" />
                        <span>Center</span>
                        <app-separator orientation="vertical" thickness="0.1rem" [color]="color" margin="1.2rem" />
                        <span>Right</span>
                    </div>
                </div>
                <div class="section-wrapper__subsection">
                    <h4>With Text:</h4>
                    <div class="example-with-text">
                        <app-separator orientation="horizontal" thickness="1px" label="OR" color="#0EA5E9"
                            margin="12px" />
                    </div>
                </div>
            </div>
        </app-showcase-card>

        <app-showcase-card title="Accrodion">
            <section class="section-wrapper">
                <div class="section-wrapper__subsection">
                    <app-accordion [multi]="false">
                        @for(item of accordionContent; track item.id) {
                            <app-accordion-item [title]="item.title">
                                <p>{{item.content}}</p>
                            </app-accordion-item>
                        }
                    </app-accordion>
                </div>
            </section>
        </app-showcase-card>
        <app-showcase-card title="Multiple Accordion (Multiple Open)">
            <section class="section-wrapper">
                <div class="section-wrapper__subsection">
                    <app-accordion [multi]="true">
                        @for(item of multiAccordionContent; track item.id) {
                            <app-accordion-item [title]="item.title">
                                <p>{{item.content}}</p>
                            </app-accordion-item>
                        }
                    </app-accordion>
                </div>
            </section>
        </app-showcase-card>
    </main>
</div>
