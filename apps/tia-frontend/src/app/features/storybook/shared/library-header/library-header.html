<header class="header">
  <div class="container">
    <div class="container__heading">
        <a class="sidebar__header" routerLink="/bank/dashboard">
          <img
            src="images/png/dashboard/banners/tia_logo.png"
            alt="TIA Logo"
            class="sidebar__header-logo"
          />
        </a>
      <div class="container__heading-info">
        <h1>Component Library</h1>
        <p>
          A comprehensive showcase of all components with their various states
        </p>
      </div>
    </div>
    <div class="container__color-switch">
      <img
        src="images/svg/library-header/color-switch.svg"
        alt="color switch icon"
      />
      <div>
        @for (item of colorConfigs(); track item.color) {
        <app-color-switch
          [color]="item.color"
          [isActive]="item.isActive"
          (selected)="setActiveColor($event)"
        ></app-color-switch>
        }
      </div>
    </div>
  </div>
</header>
