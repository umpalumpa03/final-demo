<div class="cards-page">
  <div class="cards-page__title">
    <app-library-title [title]="pageTitle" [subtitle]="pageSubtitle" />
  </div>

  <section class="cards-section">
    <h2 class="cards-section__title">Basic Cards</h2>
    <div class="cards-section__grid">
      @for (card of basicCards(); track card.id) {
      <app-basic-card
        [title]="card.title"
        [subtitle]="card.subtitle ?? ''"
        [content]="card.content ?? ''"
        [hasFooter]="card.hasFooter ?? false"
        [hasHover]="card.hasHover ?? false"
        [width]="card.width"
        [height]="card.height"
        [flex]="card.flex"
        [minWidth]="card.minWidth"
        [maxWidth]="card.maxWidth"
        [display]="card.display"
        [flexDirection]="card.flexDirection"
        [alignItems]="card.alignItems"
        [justifyContent]="card.justifyContent"
        [padding]="card.padding"
        [minHeight]="card.minHeight"
        [borderColor]="card.borderColor ?? ''"
        [gap]="card.gap"
        [backgroundColor]="card.backgroundColor"
      >
        @if (card.hasFooter) {
        <div class="card-footer" card-footer>
          <app-button size="default" variant="outline">Cancel</app-button>
          <app-button size="default" variant="default">Submit</app-button>
        </div>
        }
      </app-basic-card>
      }
    </div>
  </section>

  <section class="cards-section">
    <h2 class="cards-section__title">Statistics Cards</h2>
    <div class="cards-section__grid cards-section__grid--stats">
      @for (card of statisticsCards(); track card.id) {
      <app-statistic-card
        [label]="card.label"
        [value]="card.value"
        [change]="card.change"
        [changeType]="card.changeType"
        [icon]="card.icon"
      />
      }
    </div>
  </section>
  <section class="cards-section">
    <h2 class="cards-section__title">Category Cards</h2>
    <div class="cards-section__grid cards-section__grid--category">
      @for (card of categoryCards(); track card.id) {
      <app-category-card
        [title]="card.title"
        [subtitle]="card.subtitle"
        [icon]="card.icon"
        [iconBgColor]="card.iconBgColor"
        [count]="card.count"
        (cardClick)="handleCategoryClick(card.id)"
      />
      }
    </div>
  </section>
</div>
