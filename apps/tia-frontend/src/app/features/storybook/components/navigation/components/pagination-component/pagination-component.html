<div class="pagination">
  <h4 class="pagination__title">Default Pagination:</h4>
  <app-pagination
    [currentPage]="defaultCurrentPage()"
    [totalPages]="defaultTotalPages()"
    (pageChange)="onDefaultPageChange($event)"
  ></app-pagination>
</div>

დატას html-ში -->

<div class="pagination">
  <h4 class="pagination__title">With Ellipsis:</h4>
  <app-pagination
    [currentPage]="ellipsisCurrentPage()"
    [totalPages]="ellipsisTotalPages()"
    [config]="{
          showEllipsis: true,
          maxVisiblePages: 7,
          previousLabel: 'Previous',
          nextLabel: 'Next'
        }"
    (pageChange)="onEllipsisPageChange($event)"
  ></app-pagination>
</div>
