<app-button variant="outline" (click)="toggle()"> {{ 'storybook.overlays.topSheet.openButton' | translate }} </app-button>

<app-ui-sheet-modal [isOpen]="isOpen()" direction="top" (closed)="toggle()">
  <app-library-title
    [title]="modalTitle()"
    [subtitle]="modalSubtitle()"
  ></app-library-title>
  <span class="ui__subtitle">{{ modalMessage() }}</span>
</app-ui-sheet-modal>
