<app-button variant="destructive" (click)="toggle()">
  {{ 'storybook.overlays.deleteAccount.openButton' | translate }}
</app-button>

<app-ui-modal [isOpen]="isOpen()" (closed)="toggle()">
  <div class="delete-account">
    <header class="delete-account__header">
      <app-library-title
        [title]="dialogTitle()"
        [subtitle]="dialogSubtitle()"
      ></app-library-title>
    </header>

    <footer class="delete-account__footer">
      <app-button variant="outline" (click)="toggle()"> {{ 'storybook.overlays.deleteAccount.cancel' | translate }} </app-button>
      <app-button variant="destructive" (click)="toggle()">
        {{ 'storybook.overlays.deleteAccount.deleteButton' | translate }}
      </app-button>
    </footer>
  </div>
</app-ui-modal>
