<div class="drag-frame">
  <div class="drag-frame__container">
    <div class="drag-frame__header">
      <app-library-title
        [title]="'storybook.drag-and-drop.title' | translate"
        [subtitle]="'storybook.drag-and-drop.subtitle' | translate"
      ></app-library-title>
    </div>
    <div class="drag-frame__content">
      <app-drag-card
        [items]="items"
        (itemsChange)="items = $event"
        (itemRemoved)="onItemRemoved($event)"
        layout="grid"
        [columns]="{ default: 2, md: 1, sm: 1 }"
        (orderChange)="onOrderChange($event)"
        [cardTitle]="'storybook.drag-and-drop.sections.draggableCards.title' | translate"
        [cardDescription]="'storybook.drag-and-drop.sections.draggableCards.description' | translate"
        [editable]="true"
        [hasButton]="true"
        [hasAddOption]="true"
        (itemEdited)="onItemEdited($event)"
        (itemAdded)="onItemAdded($event)"
        (viewOptionChanged)="onViewOptionChanged($event)"
        (paginationChanged)="onPaginationChanged($event)"
      />
      <app-drag-card
        [items]="listItems"
        (itemsChange)="listItems = $event"
        (itemRemoved)="onItemRemoved($event)"
        [canDelete]="canDelete"
        layout="list"
        (orderChange)="onOrderChangeList($event)"
        [cardTitle]="'storybook.drag-and-drop.sections.sortableList.title' | translate"
        [cardDescription]="'storybook.drag-and-drop.sections.sortableList.description' | translate"
        [hasViewOption]="true"
        [hasPagination]="true"
      />
      <app-kanban-board
        [boardTitle]="'storybook.drag-and-drop.sections.kanbanBoard.title' | translate"
        [boardDescription]="'storybook.drag-and-drop.sections.kanbanBoard.description' | translate"
        [boards]="boards()"
        [items]="kanbanItems"
        [canDelete]="true"
        (itemsChange)="kanbanItems = $event"
        (cardMoved)="onCardMoved($event)"
        (cardReordered)="onCardReordered($event)"
        (cardRemoved)="onCardRemoved($event)"
      />

      <app-drag-container
        [items]="myItems"
        [layout]="'grid'"
        [columns]="{ default: 2, md: 1, sm: 1 }"
        [colspans]="[2, 1, 1, 2]"
        [containerTitle]="'storybook.drag-and-drop.sections.addContent.title' | translate"
        (itemsChange)="onItemsChange($event)"
        (orderChange)="onContainerOrderChange($event)"
      >
        @for (item of myItems; track item.id) {
        <app-draggable-card
          [itemData]="item"
          [canDelete]="true"
          [editable]="true"
          (remove)="onRemove(item.id)"
          (edit)="onEdit(item.id)"
          appDragItem
        >
          <div class="my-custom-layout">
            <span class="my-custom-layout__tag"
              >{{ 'storybook.drag-and-drop.sections.addContent.contentLabel' |
              translate }}</span
            >
            <p class="my-custom-layout__text">{{ item.subtitle }}</p>

            <div class="my-custom-layout__meta">
              <span class="my-custom-layout__id">#{{ item.id }}</span>
              <div class="my-custom-layout__dot"></div>
              <span class="my-custom-layout__date"
                >{{ 'storybook.drag-and-drop.sections.addContent.month' |
                translate }}</span
              >
            </div>
          </div>
        </app-draggable-card>
        }
      </app-drag-container>

      <app-tree-container
        [groups]="treeGroups()"
        [items]="treeItems()"
        [canDelete]="true"
        [editable]="true"
        [hasCheckbox]="true"
        [containerTitle]="'storybook.drag-and-drop.sections.treeView.title' | translate"
        [containerDescription]="'storybook.drag-and-drop.sections.treeView.description' | translate"
        (groupsChange)="onTreeGroupsChange($event)"
        (itemsChange)="onTreeItemsChange($event)"
        (itemMoved)="onTreeItemMoved($event)"
        (itemReordered)="onTreeItemReordered($event)"
        (expandedChange)="onTreeExpandedChange($event)"
        (checkedItemsChange)="onCheckedItemsChange($event)"
        [errorHeader]="'paybill.templates.errorHeader' | translate"
        [errorMessage]="'paybill.templates.errorMessage' | translate"
        [ungroupedTitle]="'common.buttons.ungrouped' | translate"
        (moveRedundant)="movenotAllowed($event)"
      />
      <app-instructions-card></app-instructions-card>
    </div>
  </div>
</div>
