<form
  class="layout"
  [formGroup]="twoColumnLayoutControl"
  (ngSubmit)="submitTwoColumnLayout()"
>
  <div class="layout__flex">
    <span>{{'storybook.forms.row.subtitle' | translate}}</span>
    <div class="layout__row">
      <div class="layout__field">
        <lib-text-input
          type="text"
          formControlName="firstName"
          [config]="rowConfigs().firstName"
        ></lib-text-input>
      </div>

      <div class="layout__field">
        <lib-text-input
          type="text"
          formControlName="lastName"
          [config]="rowConfigs().lastName"
        ></lib-text-input>
      </div>
    </div>

    <div class="layout__row">
      <div class="layout__field">
        <lib-text-input
          type="email"
          formControlName="email"
          [config]="rowConfigs().email"
        ></lib-text-input>
      </div>

      <div class="layout__field">
        <lib-text-input
          type="tel"
          formControlName="phone"
          [config]="rowConfigs().phone"
        ></lib-text-input>
      </div>
    </div>

    <div class="layout__field">
      <app-button type="submit" [fullWidth]="true"
        >{{'storybook.forms.row.btn' | translate}}</app-button
      >
    </div>
  </div>
</form>
