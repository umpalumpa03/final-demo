@let step = currentStep();

<form class="multi-step" [formGroup]="form" (ngSubmit)="submit()">
  <div class="multi-step__field">
    <app-stepper-header [content]="stepsConfig" [step]="currentStep()" />
  </div>

  @for (config of stepsConfig; track config.key) { @if (config.key === stepsConfig[step - 1].key) {
  <form class="multi-step__field" [formGroupName]="config.key">
    @if (isFrom(config)) {
    <lib-text-input
      type="text"
      formControlName="name"
      [config]="multiConfig.name"
    ></lib-text-input>
    <lib-textarea
      formControlName="bio"
      [config]="multiConfig.bio"
    ></lib-textarea>
    } @if (isTo(config)) {
    <lib-text-input
      type="text"
      formControlName="name"
      [config]="multiConfig.name"
    ></lib-text-input>
    <lib-textarea
      formControlName="bio"
      [config]="multiConfig.bio"
    ></lib-textarea>
    } @if (isAmount(config)) {
    <lib-text-input
      type="text"
      formControlName="name"
      [config]="multiConfig.name"
    ></lib-text-input>
    <lib-textarea
      formControlName="bio"
      [config]="multiConfig.bio"
    ></lib-textarea>
    }
  </form>
  } }

  <div class="multi-step__btn-section">
    <div class="multi-step__row">
      @if (canBack()) {
      <div class="multi-step__field">
        <app-button
          [fullWidth]="true"
          variant="outline"
          type="button"
          (click)="previous()"
          >Back</app-button
        >
      </div>
      } @if (canNext()) {
      <div class="multi-step__field">
        <app-button [fullWidth]="true" (click)="next()" type="button">
          Next Step
        </app-button>
      </div>
      } @else if (isLastStep()) {
      <div class="multi-step__field">
        <app-button [fullWidth]="true" type="submit">Finish</app-button>
      </div>
      }
    </div>
  </div>
</form>
