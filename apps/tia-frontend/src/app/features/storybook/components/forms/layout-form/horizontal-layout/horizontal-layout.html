<form
  class="layout"
  [formGroup]="horizontalForm"
  (ngSubmit)="submitHorizontalLayout()"
>
  <div class="layout__flex">
    <span>{{'storybook.forms.horizontal.subtitle' | translate}}</span>
    <div class="layout__horizontal">
      <span>{{'storybook.forms.horizontal.firstName' | translate}}</span>
      <div class="layout__field layout__horizontal__field">
        <lib-text-input
          type="text"
          formControlName="firstName"
          [config]="horizontalConfigs().firstName"
        ></lib-text-input>
      </div>
    </div>

    <div class="layout__horizontal">
      <span>{{'storybook.forms.horizontal.email' | translate}}</span>
      <div class="layout__field layout__horizontal__field">
        <lib-text-input
          type="email"
          formControlName="email"
          [config]="horizontalConfigs().email"
        ></lib-text-input>
      </div>
    </div>

    <div class="layout__horizontal">
      <span>{{'storybook.forms.horizontal.message' | translate}}</span>
      <div class="layout__field layout__horizontal__field">
        <lib-textarea
          type="text"
          formControlName="message"
          [config]="horizontalConfigs().message"
        ></lib-textarea>
      </div>
    </div>

    <div class="layout__field">
      <app-button type="submit" [fullWidth]="true"
        >{{'storybook.forms.horizontal.btn' | translate}}</app-button
      >
    </div>
  </div>
</form>
