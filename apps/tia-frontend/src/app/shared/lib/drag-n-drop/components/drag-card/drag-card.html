<div class="drag-card-frame">
  <div class="drag-card-frame__header">
    <h2>{{ cardTitle() }}</h2>
    <p>{{ cardDescription() }}</p>
  </div>
  <div [class]="containerClasses()" [style]="containerStyles()">
    @for (item of internalItems(); track item.id) { @let isDragging =
    draggingId() === item.id;
    <app-draggable-card
      [attr.data-card-id]="item.id"
      [itemData]="item"
      [isDragging]="isDragging"
      [isDropTarget]="dropTargetId() === item.id"
      [style]="isDragging ? draggingStyle() : null"
      [canDelete]="canDelete()"
      (dragStart)="onDragStartHandler(item.id, $event)"
      (remove)="onRemove(item.id)"
    />
    }
  </div>
</div>
