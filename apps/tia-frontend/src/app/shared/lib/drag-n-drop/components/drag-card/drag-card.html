<div class="drag-card-frame">
  <div class="drag-card-frame__header">
    <h2>Draggable Cards</h2>
    <p>Drag Cards to reorder them in a grid layout</p>
  </div>
  <div [class]="containerClasses()" [style]="containerStyles()">
    @for (item of internalItems; track item.id) {
    <app-draggable-card
      [attr.data-card-id]="item.id"
      [itemData]="item"
      [isDragging]="draggingId() === item.id"
      [isDropTarget]="dropTargetId() === item.id"
      [style]="draggingId() === item.id ? draggingStyle() : null"
      (dragStart)="onDragStartHandler(item.id, $event)"
      (remove)="onRemove(item.id)"
      [canDelete]="canDelete()"
    />
    }
  </div>
</div>
