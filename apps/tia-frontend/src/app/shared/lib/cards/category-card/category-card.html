<div class="category-card" (click)="handleClick()">
  <div class="category-card__header">
    <div class="category-card__icon" [style.background-color]="iconBgColor()">
      <img [src]="icon()" [alt]="title()" />
    </div>
    <span class="category-card__count">{{ count() }}</span>
  </div>

  <div class="category-card__body">
    <h3 class="category-card__title">{{ title() }}</h3>
    <p class="category-card__subtitle">{{ subtitle() }}</p>
  </div>
</div>
