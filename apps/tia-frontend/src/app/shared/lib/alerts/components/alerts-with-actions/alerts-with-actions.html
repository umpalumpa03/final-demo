<div class="alerts-actions" [class]="iconAlertClass()" [style.max-width]="customMaxwidth()">
  <div class="alerts-actions__content">
    <div class="alerts-actions__icon">
      <img
        class="alerts-actions__image"
        [src]="effectiveImgPath()"
        [alt]="effectiveAltName()"
      />
    </div>
    <div class="alerts-actions__info">
      <div class="alerts-actions__title">
        {{alertTitle() | firstUpper}}
      </div>
      <div class="alerts-actions__message">
        {{alertMessage() | firstUpper}}
      </div>
    </div>
  </div>
  <div class="alerts-actions__flex">
    <ng-content></ng-content>
  </div>
</div>
