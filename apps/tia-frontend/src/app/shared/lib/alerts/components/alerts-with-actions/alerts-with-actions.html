<div class="alerts-actions" [class]="iconAlertClass()">
  <div class="alerts-actions__alert-content">
    <div class="alerts-actions__alert-icon-div">
      <img
        [src]="effectiveImgPath()"
        [alt]="effectiveAltName()"
      />
    </div>
    <div class="alerts-actions__alert-info-div">
      <div class="alerts-actions__title">
        {{alertTitle() | firstUpper}}
      </div>
      <div class="alerts-actions__message">
        {{alertMessage() | firstUpper}}
      </div>
    </div>
  </div>
  <div class="alerts-actions__button-flex">
    <ng-content></ng-content>
  </div>
</div>
