<div class="simple-alerts" [class]="iconAlertClass()" [style.max-width]="customMaxwidth()">
  <div class="simple-alerts__icon">
    <img
      class="simple-alerts__image"
      [src]="effectiveImgPath()"
      [alt]="effectiveAltName()"
    />
  </div>
  <div class="simple-alerts__info">
    <div class="simple-alerts__message">
      {{alertMessage() | firstUpper}}
    </div>
  </div>
</div>
