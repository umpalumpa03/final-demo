<div class="simple-alerts" [class]="iconAlertClass()">
  <div class="simple-alerts__alert-icon-div">
    <img
      [src]="effectiveImgPath()"
      [alt]="effectiveAltName()"
    />
  </div>
  <div class="simple-alerts__alert-info-div">
    <div class="simple-alerts__message">
      {{alertMessage() | firstUpper}}
    </div>
  </div>
</div>
