<div class="alert-icons" [class]="iconAlertClass()">
  <div class="alert-icons__wrapper">
    <img
      class="alert-icons__image"
      [src]="effectiveImgPath()"
      [alt]="effectiveAltName()"
    />
  </div>
  <div class="alert-icons__content">
    <div class="alert-icons__title">{{alertType() | firstUpper}}</div>
    <div class="alert-icons__message">
      {{alertMessage() | firstUpper}}
    </div>
  </div>
</div>
