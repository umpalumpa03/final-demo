<div class="alert-states" [class]="effectiveAlertState()">
    <div class="alert-states__alert-icon-div">
        <img [src]="'/images/img/alert-icons/base-alert-' + alertType() + '.png'" [alt]="alertType() + ' icon'">
    </div>
    <div class="alert-states__alert-info-div">
       <div class="alert-states__title">{{alertTitle()}}</div>
        <div class="alert-states__message">{{alertMessage()}}</div>
    </div>
</div>
