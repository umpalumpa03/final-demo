<div [class]="alertClass()" [style.max-width]="customMaxwidth()">
  <div class="basic-alert__icon">
    <img
      class="basic-alert__image"
      [src]="effectiveImgPath()"
      [alt]="effectiveAltName()"
    />
  </div>
  <div class="basic-alert__info">
    <div class="basic-alert__title">{{effectiveTitle()}}</div>
    <div class="basic-alert__message">{{alertMessage()}}</div>
  </div>
</div>
