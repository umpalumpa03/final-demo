<div class="basic-alert" [class]="alertClass()">
    <div class="basic-alert__alert-icon-div">
        <img [src]="effectiveImgPath()" [alt]="effectiveAltName()">
    </div>
    <div class="basic-alert__alert-info-div">
       <div class="basic-alert__title">{{effectiveTitle()}}</div>
        <div class="basic-alert__message">{{effectiveMessage()}}</div>
    </div>
</div>
