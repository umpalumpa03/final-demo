<div class="basic-alert" [class.basic-alert--error]="alertType() === 'error'">
    <div class="basic-alert__alert-icon-div">
        <img [src]="'/images/img/alert-icons/base-alert-' + alertType() + '.png'" alt="info icon">
    </div>
    <div class="basic-alert__alert-info-div">
        <div>{{effectiveTitle()}}</div>
        <div>{{effectiveMessage()}}</div>
    </div>
</div>
