<div class="dismissible-alerts" [class]="iconAlertClass()">
  <div class="dismissible-alerts__alert-icon-div">
    <img
      [src]="'/images/img/alert-icons/base-alert-' + effectiveImgName() + '.png'"
      alt="info icon"
    />
  </div>
  <div class="dismissible-alerts__alert-info-div">
    <div class="dismissible-alerts__title">{{alertType() | firstUpper}}</div>
    <div class="dismissible-alerts__message">
      {{alertMessage() | firstUpper}}
    </div>
  </div>
</div>
