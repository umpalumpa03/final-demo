<div class="alert-types-icons" [class]="'alert-types-icons--' + alertType()">
    <div class="alert-types-icons__alert-icon-div">
        <img [src]="'/images/img/alert-icons/base-alert-' + effectiveImgName() + '.png'" alt="info icon">
    </div>
    <div class="alert-types-icons__alert-info-div">
        <div>{{alertType() | firstUpper}}</div>
        <div>{{alertMessage() | firstUpper}}</div>
    </div>
</div>
