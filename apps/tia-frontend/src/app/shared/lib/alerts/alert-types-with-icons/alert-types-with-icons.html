<div [class]="'basic-alert ' + (alertType())">
    <div class="alert-icon-div">
        <img [src]="'/images/img/alert-icons/base-alert-' + effectiveImgName() + '.png'" alt="info icon">
    </div>
    <div class="alert-info-div">
        <div>{{alertType() | firstUpper}}</div>
        <div>{{alertMessage() | firstUpper}}</div>
    </div>
</div>
