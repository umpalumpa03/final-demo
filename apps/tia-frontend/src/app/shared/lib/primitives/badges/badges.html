@if (visible()) {
  <div class="badge-wrapper">
    @if (label()) {
      <span class="badge-wrapper__label">{{ label() }}</span>
    }
    <span
      [class]="badgeClass()"
      [attr.data-status]="status()"
      [attr.data-dot]="dot()"
    >
    @if (shouldShowDot()) {
      <span 
        class="badge__dot"
        [class]="'badge__dot--' + dotColor()">
      </span>
    }
    @if (shouldShowIcon()) {
      <img 
        [src]="iconPath()" 
        [alt]="iconAlt()" 
        class="badge__icon"
      />
    }
    <span class="badge__text">{{ badgeText() }}</span>
    @if (dismissible()) {
      <button
        type="button"
        class="badge__dismiss"
        (click)="onDismiss()"
        aria-label="Dismiss"
      >
        <img 
          src="images/svg/badges/badges-inactive.svg" 
          alt="Dismiss" 
          class="badge__dismiss-icon"
        />
      </button>
    }
  </span>
  </div>
}
