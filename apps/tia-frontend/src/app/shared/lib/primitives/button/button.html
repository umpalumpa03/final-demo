<button
  [type]="type()"
  [class]="'button button--' + variant() + ' button--' + size()"
  [class.button--loading]="isLoading()"
  [class.button--full-width]="fullWidth()"
  [disabled]="isDisabled() || isLoading()"
  [style.--btn-width]="customWidth()"
  [style.--btn-height]="customHeight()"
  [style.--btn-color]="customColor()"
>
  @if (isLoading()) {
  <span class="button__spinner"></span>
  }

  <span class="button__content" [style.white-space]="whiteSpace()">
    @if (icon()) {
    <div
      class="button__icon"
      [class.button__icon--loading]="isLoading()"
      [style.--icon-w]="iconWidth()"
      [style.--icon-h]="iconHeight()"
    >
      <img [src]="'/images/svg/button-icons/' + icon()" alt="icon" />
    </div>
    }
    <ng-content></ng-content>
  </span>
</button>
