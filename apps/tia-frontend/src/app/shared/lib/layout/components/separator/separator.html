<div class="separator" [class.separator--horizontal]="orientation() === 'horizontal'"
  [class.separator--vertical]="orientation() === 'vertical'" [style]="separatorStyles()">
  <div class="separator__line"></div>

  @if (label()) {
  <span class="separator__label">{{ label() }}</span>
  <div class="separator__line"></div>
  }
</div>
