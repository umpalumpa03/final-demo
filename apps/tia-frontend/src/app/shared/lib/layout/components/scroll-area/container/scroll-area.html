<div 
    class="scroll-area ta-scroll-area" 
    [class.horizontal]="isHorizontal()" 
    [class.vertical]="isVertical()"
    [style.height]="height()" 
    [class.scrollbar-hidden]="!isScrollbarVisible()" 
    (scroll)="onScroll()" 
    #viewport
    [style.border]="hideBorder() && 'none'"
>
    @if (isError()) {
        <app-error-states variant="not-found" (buttonClick)="onButtonClick()"></app-error-states>
    } @else {
        <ng-content />
    }
</div>
