<div class="resizable-container" #container>
    <!-- wrapper to capture projected content -->
    <div #contentWrapper style="display: none;">
        <ng-content></ng-content>
    </div>

    <div class="panels-container" #panelsContainer>
        @for (i of [].constructor(panelSize()); track $index) {
        <div class="panel" [class.flex-panel]="isLastPanel($index)" [style.width]="getPanelWidth($index)"></div>

        @if (!isLastPanel($index)) {
        <div class="resizer" [class.dragging]="isResizerDragging($index)" (mousedown)="onMouseDown($event, $index)">
            <span class="drag-handle"></span>
        </div>
        }
        }
    </div>
</div>
