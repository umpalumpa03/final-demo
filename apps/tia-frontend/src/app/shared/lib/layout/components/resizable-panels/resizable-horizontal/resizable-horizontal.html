<div class="resizable" #container>
    <div class="resizable__content" #contentWrapper style="display: none;">
        <ng-content></ng-content>
    </div>

    <div class="resizable__panels" #panelsContainer>
        @for (i of panelIndices(); track i) {
        <div class="resizable__panel" [class.resizable__panel--flex]="isLastPanel(i)" [style.width]="getPanelWidth(i)">
        </div>

        @if (!isLastPanel(i)) {
        <div class="resizable__resizer" [class.resizable__resizer--dragging]="isResizerDragging(i)"
            (mousedown)="onMouseDown($event, i)">
            <span class="resizable__handle"></span>
        </div>
        }
        }
    </div>
</div>
