<nav class="navigation navigation--{{ orientation() }}">
  <ul class="navigation__list">
    @for (item of routeWithActive(); track item.label) {
    <li
      class="navigation__item"
      [class.navigation__item--disabled]="item.disabled"
      [class.navigation__item--active]="rla.isActive"
    >
      <a
        class="navigation__link"
        [routerLink]="item.route"
        routerLinkActive="navigation__item--active"
        #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: false }"
      >
        @if (item.icon) {
        <img
          [src]="item.icon"
          [attr.alt]="item.label"
          class="navigation__img"
        />
        }
        <span>{{ item.label }}</span>
      </a>
      @if (item.count && item.count > 0) {
      <div
        class="navigation__count"
        [class.navigation__item--active]="rla.isActive"
      >
        {{ item.count > 99 ? '99+' : item.count }}
      </div>
      }
    </li>
    }
  </ul>
</nav>
