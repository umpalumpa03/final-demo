<table class="table">
  <thead class="table__header">
    <tr class="table__header__row">
      @for (header of tableConfig().headers; track header.title) {
      <th
        class="table__header__row__item"
        [style.text-align]="header.align"
        [style.width]="header.width"
      >
        {{header.title}}
      </th>
      }
    </tr>
  </thead>
  <tbody class="table__body">
    @for (row of tableConfig().rows; track row[0].value) {
    <tr class="table__body__row">
      @for (cell of row; track cell.value) {
      <td class="table__body__row__item" [style.text-align]="cell.align">
        {{ cell.value }}
      </td>
      }
    </tr>
    }
  </tbody>
</table>
