<div
  class="tooltip-trigger"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  (mouseenter)="open()"
  (mouseleave)="close()"
>
  <ng-content></ng-content>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="isOpen() && !disabled()"
  [cdkConnectedOverlayPositions]="positionStrategy()"
>
  <div class="tooltip-overlay-content">{{ content() }}</div>
</ng-template>
