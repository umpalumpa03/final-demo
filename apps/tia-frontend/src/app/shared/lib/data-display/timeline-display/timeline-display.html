<div class="timeline-display">
  @for (item of items(); track item.id; let last = $last) {
    <div class="timeline-display__item">
      <div class="timeline-display__marker">
        <span [class]="dotClass(item.tone)"></span>
        <span
          class="timeline-display__line"
          [class.timeline-display__line--hidden]="last"
        ></span>
      </div>
      <div class="timeline-display__content">
        <p class="timeline-display__title">{{ item.title }}</p>
        <p class="timeline-display__timestamp">{{ item.timestamp }}</p>
        @if (item.detail) {
          <p class="timeline-display__detail">{{ item.detail }}</p>
        }
      </div>
    </div>
  }
</div>
