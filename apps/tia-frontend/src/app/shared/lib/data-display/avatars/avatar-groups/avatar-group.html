<div class="avatar-group">
  @for (avatar of visibleAvatars(); track avatar.initials; let index = $index) {
    <app-avatar
      class="avatar-group__item avatar-group__item--ring"
      [class.avatar-group__item--overlap]="index > 0"
      [size]="size()"
      [tone]="avatar.tone ?? 'soft'"
      [color]="avatar.color ?? 'blue'"
      [initials]="avatar.initials"
      [status]="avatar.status ?? null"
    ></app-avatar>
  }

  @if (overflowCount() > 0) {
    <app-avatar
      class="avatar-group__item avatar-group__item--ring"
      [class.avatar-group__item--overlap]="hasVisibleAvatars()"
      [size]="size()"
      [tone]="overflowTone()"
      [color]="overflowColor()"
      [initials]="'+' + overflowCount()"
    ></app-avatar>
  }
</div>
