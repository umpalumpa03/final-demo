@if (isOpen()) {
<div
  class="ui-sheet-overlay"
  (click)="close()"
  (keydown.enter)="close()"
  (keydown.space)="close()"
  role="button"
  tabindex="0"
  aria-label="Close sheet overlay"
>
  <div
    class="ui-sheet"
    [class]="'ui-sheet__' + direction()"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    tabindex="0"
  >
    <button
      type="button"
      class="ui-sheet__close"
      (click)="close()"
      aria-label="Close sheet"
    >
      <span class="ui-sheet__close-icon"></span>
    </button>

    <div class="ui-sheet__content">
      <ng-content></ng-content>
    </div>
  </div>
</div>
}
