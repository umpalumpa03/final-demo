@if (isOpen()) {
<div
  class="ui-modal"
  [class.ui-modal--tutorial]="hasTarget()"
  (click)="close()"
  (keydown.escape)="close()"
  role="button"
  tabindex="-1"
>
  @if (isTracking) {
  <div class="ui-modal__spotlight" [style]="spotlightStyle()"></div>
  } @if (hasNavigation()) {
  <button class="ui-modal__nav-btn prev" (click)="onPrev($event)">
    <img src="./images/svg/overlay/arrow.svg" alt="Previous" />
  </button>
  <button class="ui-modal__nav-btn next" (click)="onNext($event)">
    <img src="./images/svg/overlay/arrow.svg" alt="Next" />
  </button>
  }

  <div
    class="ui-modal__card"
    [class.ui-modal__card--scroll]="hasScroll()"
    [style]="cardStyle()"
    (click)="$event.stopPropagation()"
    (keydown)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    tabindex="0"
  >
    @if(!hideExit()){
    <button
      type="button"
      class="ui-modal__close"
      (click)="close()"
      aria-label="Close"
    >
      <span class="ui-modal__close-icon"></span>
    </button>
    }

    <ng-content></ng-content>
  </div>
</div>
}
