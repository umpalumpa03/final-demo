@let cfg = config();

@if (cfg.label) {
<label [for]="mergedConfig().id" class="text-input__label">
    {{ cfg.label }}
    @if (cfg.required) {
    <span class="text-input__required-star" aria-hidden="true">*</span> }
</label>
}

<div class="text-input__wrapper" [class.text-input__wrapper--has-icon]="mergedConfig().icon"
    [class.text-input__wrapper--disabled]="isDisabled()" [class.text-input__wrapper--readonly]="isReadonly()">

    @if (prefixIconUrl(); as iconUrl) {
    <div class="text-input__icon text-input__icon--prefix" [class.text-input__icon--error]="hasError()"
        [class.text-input__icon--success]="hasSuccess()">

        <div class="text-input__icon-svg" aria-hidden="true" [style.background-image]="iconUrl">
        </div>
    </div>
    }

    <input [id]="mergedConfig().id" [type]="inputType()" [value]="getDisplayValue()"
        [placeholder]="mergedConfig().placeholder" [disabled]="isDisabled()" [readOnly]="isReadonly()"
        [name]="cfg.name || ''" [autocomplete]="mergedConfig().autocomplete || 'off'"
        [attr.aria-required]="cfg.required" [attr.aria-invalid]="hasError()" [attr.aria-describedby]="ariaDescribedBy()"
        [class]="fieldClasses()" (input)="handleInput($event)" (blur)="handleBlur($event)"
        (focus)="handleFocus($event)" />

    @if (isPasswordType()) {
    <button type="button" class="text-input__icon text-input__icon--suffix" (click)="togglePasswordVisibility()">

        <div class="text-input__icon-svg" aria-hidden="true" [style.background-image]="suffixIconUrl()"
            [style.-webkit-mask-image]="suffixIconUrl()">
        </div>
    </button>
    }
</div>

<div aria-live="polite">
    @if (hasError()) {
    <span [id]="messageId()" class="text-input__message text-input__message--error">
        {{ errorMessage() }}
    </span>
    } @else if (hasSuccess() && cfg.successMessage) {
    <span [id]="messageId()" class="text-input__message text-input__message--success">
        {{ cfg.successMessage }}
    </span>
    } @else if (cfg.helperText) {
    <span [id]="messageId()" class="text-input__message text-input__message--helper">
        {{ cfg.helperText }}
    </span>
    }
</div>
