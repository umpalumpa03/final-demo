@let cfg = mergedConfig();
<div class="switch__wrapper" [class.switch__wrapper--disabled]="isDisabled()">
    <label [for]="cfg.id" class="switch">

        <input type="checkbox" [id]="cfg.id" [checked]="!!value()" [disabled]="isDisabled()"
            (change)="handleInput($event)" (blur)="handleBlur($event)" (focus)="handleFocus($event)"
            class="switch__input visually--hidden" />

        <span class="switch__slider">
            <span class="switch__thumb"></span>
        </span>

        @if (cfg.label) {
        <span class="switch__label">
            {{ cfg.label }}
        </span>
        }
    </label>

    @if (hasError()) {
    <div class="switch--error">
        {{ errorMessage() }}
    </div>
    }
</div>
