<div class="select" [class.select--disabled]="isDisabled()" [class.select--open]="isOpen()" [style.z-index]="zIndex()">
    @let cfg = mergedConfig();

    @if (cfg.label) {
    <label [for]="cfg.id" class="select__label">
        {{ cfg.label }}
        @if (cfg.required) { <span class="select__required">*</span> }
    </label>
    }

    <div class="select__control">
        <div class="select__trigger" [id]="cfg.id" (click)="toggleDropdown($event)" tabindex="0"
            [style.height]="mergedConfig().height">
            <span class="select__value" [class.select__value--placeholder]="!value()">
                {{ displayValue() }}
            </span>
            <span class="select__arrow"></span>
        </div>

        @if (isOpen()) {
        <ul class="select__dropdown">
            @for (option of options(); track option.value) {
            <li class="select__option" [class.select__option--selected]="value() === option.value"
                [class.select__option--disabled]="option.disabled" (click)="selectOption(option)">
                {{ option.label }}
            </li>
            }
        </ul>
        }
    </div>

    @if (hasError()) {
    <div class="select--error">
        {{ errorMessage() }}
    </div>
    }
</div>
