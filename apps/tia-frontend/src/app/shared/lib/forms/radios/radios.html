@let cfg = mergedConfig();
<div class="radio-group" [class.radio-group--row]="cfg.layout === 'row'" role="radiogroup">
    @if (cfg.label) {
    <label class="radio-group__label">
        {{ cfg.label }}
        @if (cfg.required) {
        <span class="required-star">*</span>
        }
    </label>
    }

    @for (option of options(); track option.value) {
    <label class="radio-option" [class.radio-option--disabled]="isOptionDisabled(option)"
        [class.radio-option--selected]="value() === option.value">

        <input type="radio" [name]="groupName" [value]="option.value" [checked]="value() === option.value"
            [disabled]="isOptionDisabled(option)" (change)="selectOption(option.value)" (blur)="handleBlur($event)"
            class="radio-option__input visually-hidden" />

        <span class="radio-option__circle"></span>

        <span class="radio-option__text">
            {{ option.label }}
        </span>
    </label>
    }

    @if (hasError()) {
    <div class="radio-group__error">
        {{ errorMessage() }}
    </div>
    }
</div>
