<div [class]="containerClasses()">
    @if (mergedConfig().label) {
    <label [for]="mergedConfig().id" class="text-input__label">
        {{ mergedConfig().label }}
        @if (mergedConfig().required) {
        <span class="text-input__required-star" aria-hidden="true">*</span>
        }
    </label>
    }

    <div class="text-input__wrapper">
        <textarea #textareaRef [id]="mergedConfig().id || ''" [value]="value() ?? ''" [rows]="mergedConfig().rows"
            [placeholder]="mergedConfig().placeholder" [style.resize]="mergedConfig().resizable"
            [disabled]="isDisabled()" [readOnly]="isReadonly()" (input)="handleInput($event)"
            (blur)="handleBlur($event)" (focus)="handleFocus($event)" class="text-input__field"
            [class.text-input__field--error]="hasError()" [class.text-input__field--success]="hasSuccess()"
            [class.text-input__field--disabled]="isDisabled()">
        </textarea>
    </div>

    <div class="text-input__footer">
        <div class="text-input__messages">
            @if (hasError()) {
            <span class="text-input__message text-input__message--error">
                {{ errorMessage() }}
            </span>
            }
        </div>

        @if (mergedConfig().showCharacterCount) {
        <span class="text-input__counter"
            [class.text-input__counter--error]="maxCharacters() > 0 && currentLength() > maxCharacters()">
            {{ counterText() }}
        </span>
        }
    </div>
</div>
