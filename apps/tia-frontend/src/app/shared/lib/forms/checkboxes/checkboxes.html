<div class="checkbox-wrapper" [class.checkbox-wrapper--disabled]="isDisabled()">
    <label [for]="mergedConfig().id" class="checkbox">

        <input type="checkbox" [id]="mergedConfig().id" [checked]="!!value()" [disabled]="isDisabled()"
            (change)="handleInput($event)" (blur)="handleBlur($event)" (focus)="handleFocus($event)"
            class="checkbox__input visually-hidden" />

        <span class="checkbox__box"></span>

        @if (mergedConfig().label) {
        <span class="checkbox__label">
            {{ mergedConfig().label }}
        </span>
        }
    </label>

    @if (hasError()) {
    <div class="checkbox__error">
        {{ errorMessage() }}
    </div>
    }
</div>
