<section class="sign-up">
    @if(!loadingState()) {
        <app-registration-form (submitRegistrationForm)="onSignUp($event)"></app-registration-form>
        
        <p class="sign-up__footer">
            {{'auth.sign-up.haveAccount' | translate}}
            <span class="sign-up__link" [routerLink]="['/auth/sign-in']"> {{'auth.sign-up.signIn' | translate}} </span>
        </p>
        
        @if (errorMessage()) {
           <app-alert-types-with-icons alertType="error" [alertMessage]="errorMessage()"> </app-alert-types-with-icons> 
        }
        
    } @else {
            <app-spinner size='4rem'></app-spinner>
    }
</section>
