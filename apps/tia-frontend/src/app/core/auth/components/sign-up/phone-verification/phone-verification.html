<app-otp-verification
  (isVerifyCalled)="submit($event)"
  type="sign-up"
  timerType="phone"
  (onTimeout)="clearedBackout()"
  (onBackOut)="clearedBackout()"
  [phoneErrorMessage]="PhoneOtpError()?.message ?? null"
  [inputOtpConfig]="inputOtpConfig"
  [otpResendType]="otpResendType"
></app-otp-verification>
