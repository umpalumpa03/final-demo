<app-otp-verification
  type="forgot-password"
  (isVerifyCalled)="verifyResetOtp($event)"
  (isResendCalled)="resendOtp()"
  timerType="otp"
  (onBackOut)="clearedBackout()"
  [errorMessage]="errorMessage()"
  [inputOtpConfig]="otpInputConfig"
  [otpResendType]="otpResendType"
></app-otp-verification>
