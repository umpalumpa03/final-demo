  <div left class="auth-panel success-panel">
    <div class="success-icon">OK</div>
    <div class="auth-panel__header">
      <h2 class="auth-panel__title">Password Reset Successful!</h2>
      <p class="auth-panel__subtitle">
        Your password has been successfully reset.
      </p>
    </div>

    <div class="auth-feedback">
      Password reset successful! Redirecting to login...
    </div>

    <div class="success-countdown">
      You will be redirected to login in
      <span class="success-countdown__value">{{ countdown() }}</span>
    </div>

    <button class="auth-inline-link" type="button" (click)="redirectToLogin()">
      Go to Login now
    </button>
  </div>
