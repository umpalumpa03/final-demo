<app-auth-layout>
  <div left class="auth-panel">
    <div class="auth-panel__header">
      <h2 class="auth-panel__title">Forgot Password</h2>
      <p class="auth-panel__subtitle">
        Enter your email to reset your password
      </p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <lib-text-input
        type="email"
        formControlName="email"
        [config]="emailConfig()"
      ></lib-text-input>

      @if (submitError()) {
        <div class="auth-error">{{ submitError() }}</div>
      }

      <div class="auth-form__actions">
        <app-button
          type="submit"
          size="large"
          [fullWidth]="true"
          [isLoading]="isSubmitting()"
        >
          Continue to OTP Verification
        </app-button>
      </div>
    </form>

    <p class="auth-panel__footer">
      Remember your password?
      <a class="auth-link" routerLink="/auth/sign-in">Sign in</a>
    </p>
  </div>

  <div right class="auth-side">
    <h3 class="auth-side__title">Reset Your Password!</h3>
    <p class="auth-side__subtitle">
      Enter your email to receive a password reset code.
    </p>

    <div class="auth-side__list">
      <div class="auth-side__item">
        <span class="auth-side__icon">
          <img src="images/svg/command-palette/mail.svg" alt="envelope SVG">
        </span>
        <div>
          <p class="auth-side__item-title">Email Verification</p>
          <p class="auth-side__item-subtitle">
            Code sent to your registered email
          </p>
        </div>
      </div>
    </div>
  </div>
</app-auth-layout>
