<div class="auth-panel">
  <div class="auth-panel__header">
    <app-library-title
      [title]="title | translate"
      [subtitle]="subtitle | translate"
    ></app-library-title>
  </div>

  <app-registration-form
    [isRegistration]="false"
    [buttonText]="buttonText | translate"
    (submitRegistrationForm)="submit($event)"
  ></app-registration-form>

  <p class="auth-panel__footer">
    {{ 'auth.reset-password.rememberPassword' | translate }}
    <a class="auth-link" routerLink="/auth/sign-in">{{ 'auth.reset-password.signIn' | translate }}</a>
  </p>
</div>
