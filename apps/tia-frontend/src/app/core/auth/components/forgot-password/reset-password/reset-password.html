  <div left class="auth-panel">
    <div class="auth-panel__header">
      <h2 class="auth-panel__title">Reset Password</h2>
      <p class="auth-panel__subtitle">
        Enter a new password for your account
      </p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <lib-text-input
        type="password"
        formControlName="password"
        [config]="passwordConfig"
      ></lib-text-input>

      <lib-text-input
        type="password"
        formControlName="confirmPassword"
        [config]="confirmConfig()"
      ></lib-text-input>

      @if (submitError()) {
        <div class="auth-error">{{ submitError() }}</div>
      }

      <div class="auth-form__actions">
        <app-button
          type="submit"
          size="large"
          [fullWidth]="true"
          [isLoading]="isSubmitting()"
        >
          Reset Password
        </app-button>
      </div>
    </form>

    <p class="auth-panel__footer">
      Remember your password?
      <a class="auth-link" routerLink="/auth/sign-in">Sign in</a>
    </p>
  </div>
