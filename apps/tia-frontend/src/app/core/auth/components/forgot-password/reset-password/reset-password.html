<div left class="auth-panel">
  <div class="auth-panel__header">
    <h2 class="auth-panel__title">Reset Password</h2>
    <p class="auth-panel__subtitle">Enter a new password for your account</p>
  </div>

  <app-registration-form
    [isRegistration]="false"
    [buttonText]="buttonText"
    (submitRegistrationForm)="submit($event)"
  ></app-registration-form>

  @if (submitError()) {
    <div class="auth-error">{{ submitError() }}</div>
  }

  <p class="auth-panel__footer">
    Remember your password?
    <a class="auth-link" routerLink="/auth/sign-in">Sign in</a>
  </p>
</div>
