<app-otp-verification
  type="sign-in"
  (isVerifyCalled)="verifyOtp($event)"
  (isResendCalled)="resendOtp($event)"
  timerType="otp"
  [timeLimit]="1"
  (onBackOut)="clearedBackout()"
  [errorMessage]="otpError()?.message ?? null"
  [remainingAttempts]="otpError()?.remainingAttempts ?? null"
></app-otp-verification>
