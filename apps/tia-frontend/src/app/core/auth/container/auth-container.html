@if (isLoading()) {
<div class="auth">
  <div class="auth__auth-layout">
    <div class="auth__auth-layout__content">
      <header class="auth__auth-layout__header">
        <div class="auth__auth-layout__header__bar">
          <a class="auth__auth-layout__header__bar__logo">
            <span aria-hidden="true">T</span>
          </a>
          <h1 class="auth__auth-layout__header__bar__title">TIA</h1>
        </div>
        <app-language-switcher></app-language-switcher>
      </header>

      <main class="auth__auth-layout__body">
        <div class="auth__auth-layout__form">
          <div class="auth-skeleton-grid">
            @for (i of [1, 2, 3]; track i) {
            <div class="auth-skeleton-card">
              <div class="auth-skeleton-card__header">
                <div class="auth-skeleton-card__titles">
                  <app-skeleton
                    variant="text"
                    height="1.6rem"
                    width="12rem"
                  ></app-skeleton>
                  <app-skeleton
                    variant="text"
                    height="1.2rem"
                    width="8rem"
                  ></app-skeleton>
                </div>
              </div>
              <div class="auth-skeleton-card__body">
                <app-skeleton height="5rem"></app-skeleton>
              </div>
            </div>
            }
          </div>
        </div>
      </main>
    </div>

    <aside class="auth__auth-layout__pannel">
      <div class="auth__auth-layout__pannel__wrapper">
        <div class="auth-skeleton-grid">
          @for (i of [1, 2, 3]; track i) {
          <div class="auth-skeleton-card">
            <div class="auth-skeleton-card__header">
              <div class="auth-skeleton-card__titles">
                <app-skeleton
                  variant="text"
                  height="1.6rem"
                  width="12rem"
                ></app-skeleton>
                <app-skeleton
                  variant="text"
                  height="1.2rem"
                  width="8rem"
                ></app-skeleton>
              </div>
            </div>
            <div class="auth-skeleton-card__body">
              <app-skeleton height="5rem"></app-skeleton>
            </div>
          </div>
          }
        </div>
      </div>
    </aside>
  </div>
</div>
} @else {
<div class="auth">
  <div class="auth__auth-layout">
    <div class="auth__auth-layout__content">
      <header class="auth__auth-layout__header">
        <div class="auth__auth-layout__header__bar">
          <a class="auth__auth-layout__header__bar__logo">
            <span aria-hidden="true">T</span>
          </a>
          <h1 class="auth__auth-layout__header__bar__title">TIA</h1>
        </div>
        <app-language-switcher></app-language-switcher>
      </header>

      <main class="auth__auth-layout__body">
        <div class="auth__auth-layout__form">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>

    <aside class="auth__auth-layout__pannel">
      <div class="auth__auth-layout__pannel__wrapper">
        @if (sidePanelData()) {
        <app-side-panel
          [title]="sidePanelData()!.title"
          [description]="sidePanelData()!.description"
          [features]="sidePanelData()!.features"
        />
        }
      </div>
    </aside>
  </div>
</div>
}
