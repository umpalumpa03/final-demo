<div class="error-page">
  <div class="error-page__content">
    <div class="error-page__circle error-page__circle--icon">
      <img src="images/svg/auth/download.svg" alt="" />
    </div>

    <h1 class="error-page__title">{{'auth.error-page.title' | translate}}</h1>
    <p class="error-page__description">
      {{'auth.error-page.subtitle' | translate}}
    </p>

    <p class="error-page__redirect-text">
      {{'auth.error-page.redirectText' | translate}} {{redirectText() ||
      ('auth.error-page.login' | translate)}}
    </p>

    <div class="error-page__circle error-page__circle--timer">
      {{ timer() }}
    </div>
  </div>
</div>
