<div class="otp-verification">
  <div class="otp-verification__icon" aria-hidden="true">
    <img [src]="iconUrl()" />
  </div>
  <h2 class="otp-verification__title">{{ title() }}</h2>
  <p class="otp-verification__subtext">{{ subText() }}</p>

  @if (!isLoading()) {
  <form class="auth-form" [formGroup]="otpForm" (ngSubmit)="onSubmit()">
    @if(timerType() === 'otp'){
    <div class="otp-field">
      <lib-otp formControlName="code" [config]="otpConfig()"></lib-otp>
    </div>
    } @else {
    <div class="otp-field__phone">
      <lib-text-input
        formControlName="code"
        [config]="phoneConfig()"
      ></lib-text-input>
    </div>
    } @if (submitError()) {
    <div class="auth-error">{{ submitError() }}</div>
    }

    <div class="auth-form__actions">
      <app-button
        [isDisabled]="isResendActive()"
        type="submit"
        [fullWidth]="true"
      >
        {{ submitBtnName() }}
      </app-button>
    </div>

    @if (backLink()) {
    <app-button
      [fullWidth]="true"
      class="otp-verification__back"
      [routerLink]="backLink()"
      variant="outline"
      >{{ backLinkText() }}</app-button
    >
    }
    <div class="timer-compact">
      <div class="timer-compact__timer">
        <span
          class="timer-compact__status-dot"
          [class.timer-compact__status-dot--pulse]="countdown() > 0"
        >
        </span>

        <div class="timer-compact__readout">
          <span class="timer-compact__value">{{ countdown() }}</span>
          <span class="timer-compact__unit">s</span>
        </div>
      </div>
      @if(timerType() === 'otp') {
      <div
        class="timer-compact__resend"
        [class.timer-compact__resend--disabled]="countdown() > 0"
      >
        <span class="timer-compact__resend-text">Didn't receive the code?</span>
        <span class="timer-compact__link" (click)="onResend()"> Resend </span>
      </div>
      }
    </div>
  </form>
  } @else {
  <div class="sign-in sign-in-loader">
    <app-spinner size="4rem"></app-spinner>
  </div>
  }
</div>
