<div class="side-panel">
  <h2 class="side-panel__title">{{ title() | translate }}</h2>
  <p class="side-panel__description">{{ description() | translate }}</p>

  <div class="features">
    @for(feature of (features()); track feature.id) {
    <div class="side-panel__feature">
      <div class="side-panel__feature__icon-box">
        <div
          class="side-panel__feature__icon-box__icon"
          [style.background-image]="getIconUrl(feature.icon)"
        ></div>
      </div>
      <div>
        <div class="side-panel__feature__title">
          {{ feature.title | translate }}
        </div>
        <div class="side-panel__feature__text">
          {{ feature.text | translate }}
        </div>
      </div>
    </div>
    }
  </div>
</div>
