<div class="side-panel">
  <h2 class="side-panel__title">{{ title() }}</h2>
  <p class="side-panel__description">{{ description() }}</p>

  <div class="features">
    @for(feature of (features()); track feature.id) {
    <div class="side-panel__feature">
      <div class="side-panel__feature__icon-box">
        <div
          class="side-panel__feature__icon-box__icon"
          [style.background-image]="getIconUrl(feature.icon)"
        ></div>
      </div>
      <div>
        <div class="side-panel__feature__title">{{ feature.title }}</div>
        <div class="side-panel__feature__text">{{ feature.text }}</div>
      </div>
    </div>
    }
  </div>
</div>
